<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reclamações de Horas</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="css/reclamacoes.css">
<script>if(localStorage.getItem('darkMode')==='1')document.documentElement.classList.add('dark');</script>
</head>
<body>
<div class="page">
  <div class="header-top">
    <h1>Reclamações de Horas</h1>
    <span id="syncStatus"></span>
  </div>
  <p class="subtitle" id="pageSubtitle">A carregar…</p>
  <div class="stats-row" id="statsBar"><div style="font-size:11px;color:var(--muted)">A carregar…</div></div>

  <!-- FORM -->
  <div class="form-panel" id="formPanel" style="display:none">
    <div class="panel-title">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 5v4l2.5 1.5"/></svg>
      Nova Reclamação
    </div>
    <div class="section-label">Dados do trabalhador temporário</div>
    <div class="form-grid">
      <div><label class="field-label">Nº de funcionário</label><input type="text" class="form-input" id="fNumFunc" placeholder="ex: 12345" autocomplete="off"></div>
      <div><label class="field-label">NIF<span class="req">*</span></label><input type="text" class="form-input" id="fNif" placeholder="ex: 123456789" maxlength="9" autocomplete="off"></div>
      <div class="full"><label class="field-label">Nome completo<span class="req">*</span></label><input type="text" class="form-input" id="fNome" placeholder="ex: João Silva" autocomplete="off"></div>
      <div><label class="field-label">Categoria profissional</label><input type="text" class="form-input" id="fCategoria" placeholder="ex: Operador de armazém" autocomplete="off"></div>
      <div><label class="field-label">Empresa utilizadora<span class="req">*</span></label><input type="text" class="form-input" id="fEmpresa" placeholder="ex: Empresa ABC Lda" autocomplete="off"></div>
      <div><label class="field-label">Escritório</label><select class="form-select" id="fEscritorio"><option value="">A carregar…</option></select></div>
    </div>

    <div class="divider"></div>
    <div class="section-label">Períodos reclamados<span class="req">*</span></div>
    <div class="periodos-wrap" id="periodosWrap"></div>
    <button class="btn-add-periodo" onclick="adicionarPeriodo()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v12M2 8h12"/></svg>
      Adicionar período
    </button>

    <div class="divider"></div>
    <div class="section-label">Entrada da reclamação</div>
    <div class="form-grid">
      <div class="full">
        <label class="field-label">Canal de entrada<span class="req">*</span></label>
        <div class="canal-row">
          <button class="canal-pill sel" data-c="email" onclick="selCanal('email')">📧 Email</button>
          <button class="canal-pill" data-c="telefone" onclick="selCanal('telefone')">📞 Telefone</button>
          <button class="canal-pill" data-c="mensagem" onclick="selCanal('mensagem')">💬 Mensagem</button>
          <button class="canal-pill" data-c="presencial" onclick="selCanal('presencial')">🧑 Presencial</button>
        </div>
      </div>
      <div class="full"><label class="field-label">Notas internas</label><textarea class="form-textarea" id="fNotas" placeholder="ex: Trabalhador diz que fez turno extra na sexta, não registado no ponto…"></textarea></div>
      <div><label class="field-label">Registado por</label><div class="user-info-row"><span class="user-info-name" id="userName">A carregar…</span></div></div>
    </div>
    <div class="divider"></div>
    <div class="section-label">Anexos</div>
    <label class="btn-attach" onclick="void(0)">
      📎 Adicionar ficheiros
      <input type="file" id="fFicheiros" multiple onchange="onPendingFilesChange(this)">
    </label>
    <div id="pendingFilesList" style="margin-top:6px;"></div>
    <div class="upload-status" id="formUploadStatus"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">
      <button class="btn btn-secondary" onclick="limparForm()">Limpar</button>
      <button class="btn btn-primary" id="btnRegistarReclamacao" onclick="submitReclamacao()">+ Registar Reclamação</button>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="Pesquisar por nome, NIF ou nº de funcionário…" oninput="render()">
  </div>

  <!-- CONTROLS -->
  <div class="controls-wrap">
    <div class="controls-row">
      <span class="ctrl-label">Estado:</span>
      <button class="filter-btn active" data-f="ativos" onclick="setFiltro('ativos')">Ativos</button>
      <button class="filter-btn" data-f="todos" onclick="setFiltro('todos')">Todos</button>
      <button class="filter-btn" data-f="nova" onclick="setFiltro('nova')">Novas</button>
      <button class="filter-btn" data-f="enviada" onclick="setFiltro('enviada')">Enviadas</button>
      <button class="filter-btn" data-f="confirmada" onclick="setFiltro('confirmada')">Confirmadas</button>
      <button class="filter-btn" data-f="paga" onclick="setFiltro('paga')">Pagas</button>
      <button class="filter-btn" data-f="negada" onclick="setFiltro('negada')">Negadas</button>
      <span class="count-badge" id="countBadge"></span>
    </div>
    <div class="controls-row">
      <span class="ctrl-label">Filtrar:</span>
      <select class="filter-select" id="filterEscritorio" onchange="render()"><option value="">Todos os escritórios</option></select>
      <select class="filter-select" id="filterEmpresa" onchange="render()"><option value="">Todas as empresas</option></select>
      <div style="margin-left:auto;display:flex;gap:6px;">
        <button class="btn btn-secondary btn-sm" onclick="exportarExcel()" title="Exportar para Excel" style="display:flex;align-items:center;gap:5px;">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="2" width="12" height="12" rx="1.5"/><path d="M5 6l2 2 2-2M7 8v4M5 10h4"/></svg>
          Excel
        </button>
        <button class="btn btn-secondary btn-sm" onclick="exportarPDF()" title="Exportar para PDF" style="display:flex;align-items:center;gap:5px;">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 2H4a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V6L9 2z"/><path d="M9 2v4h4"/></svg>
          PDF
        </button>
      </div>
    </div>
  </div>

  <div class="cards-list" id="cardsList"></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/utils.js"></script>
<script src="js/module-registry.js"></script>
<script src="js/auth.js"></script>
<script src="js/offices-service.js"></script>
<script src="js/config-escritorios.js"></script>
<script src="js/app-platform.js"></script>
<script src="js/auditoria.js"></script>
<script src="js/reclamacoes-service.js"></script>
<script src="js/reclamacoes.js"></script>
</body>
</html>
