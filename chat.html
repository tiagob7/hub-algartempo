<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<link rel="stylesheet" href="css/chat.css">
<script>if(localStorage.getItem('darkMode')==='1')document.documentElement.classList.add('dark');</script>
</head>
<body>

<div class="page">
  <div class="chat-wrap" id="chatWrap">

    <!-- ── Sidebar: lista de conversas ── -->
    <aside class="chat-sidebar" id="chatSidebar">
      <div class="chat-sidebar-head">
        <h2 class="chat-sidebar-title">Mensagens</h2>
        <button class="btn-new-chat" id="btnNewDm" title="Nova conversa">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M8 2v12M2 8h12"/>
          </svg>
        </button>
      </div>
      <div class="chat-search-row">
        <input type="search" id="chatSearch" placeholder="Pesquisar…" autocomplete="off">
      </div>
      <div class="chat-list" id="chatList"></div>
    </aside>

    <!-- ── Painel da thread ── -->
    <main class="chat-thread" id="chatThread">

      <!-- Estado vazio (nenhuma conversa selecionada) -->
      <div class="chat-empty" id="chatEmpty">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        <span>Seleciona uma conversa</span>
      </div>

      <!-- Thread ativa -->
      <div class="chat-thread-inner" id="threadInner" style="display:none;">

        <!-- Cabeçalho -->
        <div class="chat-thread-head" id="threadHead"></div>

        <!-- Mensagens -->
        <div class="chat-messages" id="chatMessages"></div>

        <!-- Composer -->
        <div class="chat-composer">
          <textarea id="chatInput" placeholder="Escreve uma mensagem…" rows="1"></textarea>
          <button class="send-btn" id="btnSend" title="Enviar (Enter)">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
              <path d="M15.5 8L1 1.5l2.5 6.5-2.5 6.5z"/>
            </svg>
          </button>
        </div>

      </div>
    </main>

  </div>
</div>

<!-- ══ Modal: nova conversa ══ -->
<div class="modal-overlay" id="newChatModal">
  <div class="new-chat-modal">

    <div class="modal-head">
      <span class="modal-title">Nova conversa</span>
      <button class="modal-close" id="btnCloseNewChat">✕</button>
    </div>

    <div class="modal-tabs">
      <button class="modal-tab active" data-tab="dm">Mensagem direta</button>
      <button class="modal-tab" data-tab="grupo">Grupo</button>
    </div>

    <!-- Tab DM -->
    <div id="tabDm" style="display:flex;">
      <input type="search" id="userSearch" placeholder="Pesquisar utilizador…" autocomplete="off">
      <div id="userList" class="user-picker-list"></div>
    </div>

    <!-- Tab Grupo -->
    <div id="tabGrupo" style="display:none;">
      <input type="text" id="groupName" placeholder="Nome do grupo">
      <input type="search" id="groupUserSearch" placeholder="Adicionar participante…" autocomplete="off">
      <div id="groupSelected" class="group-selected-row"></div>
      <div id="groupUserList" class="user-picker-list"></div>
      <div class="modal-footer">
        <button class="modal-btn secondary" id="btnCancelGroup">Cancelar</button>
        <button class="modal-btn primary" id="btnCreateGroup">Criar grupo</button>
      </div>
    </div>

  </div>
</div>

<!-- ── Firebase SDKs (compat v9) ── -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- ── Ficheiros partilhados ── -->
<script src="js/firebase-init.js"></script>
<script src="js/utils.js"></script>
<script src="js/module-registry.js"></script>
<script src="js/auth.js"></script>
<script src="js/auditoria.js"></script>
<script src="js/offices-service.js"></script>
<script src="js/config-escritorios.js"></script>
<script src="js/app-platform.js"></script>
<script src="js/users-service.js"></script>
<!-- ── Módulo chat ── -->
<script src="js/chat-service.js"></script>
<script src="js/chat.js"></script>

</body>
</html>
