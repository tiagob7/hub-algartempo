<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reclamações — Assistente · Algartempo</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
:root{--navy:#1A206D;--navy-light:#232c8a;--cyan:#00A1DE;--cyan-dark:#0088bb;--cyan-light:#e6f7fd;--cyan-border:#b3e5f7;--bg:#f0f4f8;--surface:#fff;--surface2:#f5f7fb;--border:#dde3ed;--text:#14213d;--muted:#6b7898;--green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;--red:#dc2626;--red-bg:#fef2f2;--red-border:#fecaca;--amber:#d97706;--amber-bg:#fffbeb;--amber-border:#fde68a;--blue-bg:#eef0fc;--blue-border:#c0c6f0;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:'Poppins',sans-serif;color:var(--text);}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(135deg,rgba(26,32,109,.03) 25%,transparent 25%) -10px 0,linear-gradient(225deg,rgba(26,32,109,.03) 25%,transparent 25%) -10px 0,linear-gradient(315deg,rgba(26,32,109,.03) 25%,transparent 25%),linear-gradient(45deg,rgba(26,32,109,.03) 25%,transparent 25%);background-size:20px 20px;pointer-events:none;z-index:0;}
.shell{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:680px;margin:0 auto;}
.chat-header{flex-shrink:0;padding:0 20px;height:64px;border-bottom:1px solid var(--border);background:var(--navy);display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(26,32,109,.25);}
.chat-logo-img{height:26px;display:block;}
.chat-logo-fallback{display:none;color:#fff;font-weight:800;font-size:15px;letter-spacing:.05em;}
.chat-header-divider{width:1px;height:26px;background:rgba(255,255,255,.2);}
.chat-header-title{font-weight:700;font-size:13px;letter-spacing:-.01em;color:#fff;}
.chat-header-sub{font-size:10px;color:rgba(255,255,255,.6);font-weight:500;margin-top:1px;letter-spacing:.04em;}
.chat-header-status{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,.6);font-weight:500;letter-spacing:.04em;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 0 2px rgba(74,222,128,.25);}
.chat-messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
.msg{display:flex;gap:8px;max-width:90%;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg.bot{align-self:flex-start;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg-avatar{width:30px;height:30px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;margin-top:2px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);box-shadow:0 2px 8px rgba(26,32,109,.2);}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--cyan-dark) 0%,var(--cyan) 100%);}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:12px;line-height:1.65;border:1.5px solid var(--border);max-width:100%;font-weight:400;}
.msg.bot .msg-bubble{background:var(--surface);border-radius:4px 14px 14px 14px;}
.msg.user .msg-bubble{background:var(--navy);color:#fff;border-color:transparent;border-radius:14px 4px 14px 14px;font-weight:500;}
.msg-bubble strong{font-weight:700;}
.msg-bubble ul{padding-left:16px;margin-top:4px;}
.msg-bubble li{margin-bottom:2px;}
.typing-bubble{display:flex;gap:4px;align-items:center;padding:12px 16px;}
.typing-bubble span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce .9s infinite;}
.typing-bubble span:nth-child(2){animation-delay:.15s;}
.typing-bubble span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
.quick-replies{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;margin-left:38px;}
.qr{padding:5px 13px;border-radius:20px;background:var(--surface);border:1.5px solid var(--border);font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;cursor:pointer;color:var(--navy);transition:all .15s;}
.qr:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-light);}
.file-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
.file-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;background:var(--cyan-light);border:1.5px solid var(--cyan-border);font-size:10px;color:var(--cyan-dark);font-weight:500;max-width:200px;}
.file-chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-chip-del{cursor:pointer;opacity:.6;font-size:13px;flex-shrink:0;line-height:1;}
.file-chip-del:hover{opacity:1;color:var(--red);}
.upload-progress{height:2px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;}
.upload-progress-bar{height:100%;background:var(--cyan);border-radius:2px;transition:width .3s;width:0%;}
.chat-input-area{flex-shrink:0;padding:12px 16px 16px;border-top:1px solid var(--border);background:rgba(255,255,255,.95);backdrop-filter:blur(8px);}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.input-wrap{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:8px 12px;transition:border-color .15s,box-shadow .15s;}
.input-wrap:focus-within{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,161,222,.1);}
#msgInput{width:100%;background:none;border:none;outline:none;font-family:'Poppins',sans-serif;font-size:12px;font-weight:400;color:var(--text);resize:none;max-height:100px;min-height:20px;line-height:1.5;}
#msgInput::placeholder{color:#aab4c8;}
.input-actions{display:flex;align-items:center;gap:6px;margin-top:6px;}
.btn-attach{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px;transition:color .15s;display:flex;align-items:center;}
.btn-attach:hover{color:var(--cyan);}
.attach-hint{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.03em;}
.btn-send{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;box-shadow:0 4px 12px rgba(26,32,109,.25);}
.btn-send:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(26,32,109,.35);}
.btn-send svg{width:16px;height:16px;color:#fff;}
.btn-send:disabled{opacity:.4;cursor:default;transform:none;}
.summary-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;font-size:11px;margin-top:8px;line-height:1.8;}
.summary-card .row{display:flex;gap:8px;}
.summary-card .lbl{color:var(--muted);min-width:100px;text-transform:uppercase;font-size:9px;font-weight:700;letter-spacing:.07em;padding-top:2px;}
.summary-card .val{color:var(--navy);font-weight:500;flex:1;}
.summary-card .divider{border:none;border-top:1px solid var(--border);margin:8px 0;}
.summary-files{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.summary-file{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;background:var(--cyan-light);border:1.5px solid var(--cyan-border);font-size:9px;color:var(--cyan-dark);font-weight:600;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;font-size:12px;font-weight:500;padding:10px 22px;border-radius:24px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(26,32,109,.35);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-track{background:transparent;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>
<div class="shell">
  <div class="chat-header">
    <img class="chat-logo-img" src="https://algartempo.pt/images/static/logoBranco.svg" alt="Algartempo" onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block'">
    <span id="logoFallback" class="chat-logo-fallback">ALGARTEMPO</span>
    <div class="chat-header-divider"></div>
    <div>
      <div class="chat-header-title">Assistente de Reclamações</div>
      <div class="chat-header-sub">Portal do Trabalhador</div>
    </div>
    <div class="chat-header-status"><div class="status-dot"></div>Online</div>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <div id="fileChips" class="file-chips"></div>
    <div class="input-row">
      <div class="input-wrap">
        <textarea id="msgInput" rows="1" placeholder="Escreve aqui…"></textarea>
        <div class="input-actions">
          <label class="btn-attach" title="Anexar ficheiro">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="display:none" onchange="onFilesSelected(event)">
          </label>
          <span class="attach-hint">PDF · Imagem · Doc</span>
        </div>
      </div>
      <button class="btn-send" id="btnSend" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
if(!firebase.apps.length){firebase.initializeApp({apiKey:"AIzaSyBbTDfCCC9o5oxMSMRsvCUC50Iu6L0aqT8",authDomain:"calendario-trabalho-39a6c.firebaseapp.com",projectId:"calendario-trabalho-39a6c",storageBucket:"calendario-trabalho-39a6c.firebasestorage.app",messagingSenderId:"596069405321",appId:"1:596069405321:web:275bb9da220206d3da6c58"});}
const db=firebase.firestore(),storage=firebase.storage(),colRec=db.collection('reclamacoes_horas'),colPortal=db.collection('trabalhadores_portal');
let state={step:'start',trabalhador:null,nif:'',numFunc:'',nome:'',empresa:'',categoria:'',escritorio:'',notas:'',periodos:[],ficheiros:[],periodoAtual:null,entradaHora:'',saidaHora:''};
let pendingFiles=[];
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const ESCRITORIOS_FALLBACK=[{id:'quarteira',nome:'Quarteira'},{id:'albufeira',nome:'Albufeira'},{id:'lisboa',nome:'Lisboa'},{id:'porto',nome:'Porto'}];
let escritorios=ESCRITORIOS_FALLBACK;
db.collection('config').doc('escritorios').get().then(s=>{if(s.exists&&Array.isArray(s.data().lista))escritorios=s.data().lista;}).catch(()=>{});
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function addMsg(role,html,opts={}){const el=document.createElement('div');el.className=`msg ${role}`;const avatar=document.createElement('div');avatar.className='msg-avatar';avatar.textContent=role==='bot'?'🤖':'👤';const bubble=document.createElement('div');bubble.className='msg-bubble';bubble.innerHTML=html;el.appendChild(avatar);el.appendChild(bubble);document.getElementById('chatMessages').appendChild(el);if(opts.quickReplies&&opts.quickReplies.length){const qr=document.createElement('div');qr.className='quick-replies';opts.quickReplies.forEach(label=>{const btn=document.createElement('button');btn.className='qr';btn.textContent=label;btn.onclick=()=>{qr.remove();handleQuickReply(label);};qr.appendChild(btn);});document.getElementById('chatMessages').appendChild(qr);}scrollBottom();return el;}
function addTyping(){const el=document.createElement('div');el.className='msg bot';el.id='typing';el.innerHTML=`<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing-bubble"><span></span><span></span><span></span></div></div>`;document.getElementById('chatMessages').appendChild(el);scrollBottom();}
function removeTyping(){document.getElementById('typing')?.remove();}
function scrollBottom(){const el=document.getElementById('chatMessages');setTimeout(()=>el.scrollTop=el.scrollHeight,50);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function onFilesSelected(e){const files=[...e.target.files];files.forEach(f=>{if(pendingFiles.find(p=>p.name===f.name))return;pendingFiles.push(f);});renderFileChips();e.target.value='';}
function renderFileChips(){const el=document.getElementById('fileChips');el.innerHTML=pendingFiles.map((f,i)=>`<div class="file-chip"><svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V5L9 1z"/><path d="M9 1v4h4"/></svg><span class="file-chip-name">${escHtml(f.name)}</span><span class="file-chip-del" onclick="removeFile(${i})">×</span></div>`).join('');}
function removeFile(i){pendingFiles.splice(i,1);renderFileChips();}
async function uploadFiles(recId){if(!pendingFiles.length)return[];const urls=[];for(const file of pendingFiles){const ref=storage.ref(`reclamacoes/${recId}/${Date.now()}_${file.name}`);const task=ref.put(file);await new Promise((res,rej)=>{task.on('state_changed',null,rej,async()=>{const url=await ref.getDownloadURL();urls.push({nome:file.name,url,tamanho:file.size});res();});});}return urls;}
async function botReply(html,opts={},delay=600){addTyping();await new Promise(r=>setTimeout(r,delay));removeTyping();addMsg('bot',html,opts);}
async function start(){await botReply(`Olá! 👋 Bem-vindo ao <strong>Assistente de Reclamações de Horas</strong>.<br><br>Vou ajudar-te a submeter uma reclamação em poucos passos.<br>Já tens um <strong>código de portal</strong> de um acesso anterior?`,{quickReplies:['Sim, tenho código','Não, é a primeira vez']});state.step='start_choice';}
async function handleInput(text){text=text.trim();if(!text&&!pendingFiles.length)return;const s=state.step;if(pendingFiles.length&&s==='ficheiros'){addMsg('user',`📎 ${pendingFiles.length} ficheiro(s) anexado(s)`);await processStep('ficheiros_ok');return;}if(text)addMsg('user',escHtml(text));await processStep(s,text);}
async function processStep(step,input=''){const inp=input.trim();switch(step){case 'start_choice':{const temCodigo=/sim|tenho|código|codigo|ja|já/i.test(inp);if(temCodigo){await botReply('Qual é o teu <strong>código de portal</strong>? (ex: XK7F2)');state.step='codigo_login';}else{await botReply('Sem problema! Qual é o teu <strong>NIF</strong>?');state.step='nif';}break;}case 'codigo_login':{const codigo=inp.toUpperCase();addTyping();try{const snap=await colPortal.doc(codigo).get();removeTyping();if(snap.exists){state.trabalhador={id:snap.id,...snap.data()};state.nif=state.trabalhador.nif||'';state.numFunc=state.trabalhador.numFunc||'';state.nome=state.trabalhador.nome||'';await botReply(`Bem-vindo de volta${state.nome?', <strong>'+escHtml(state.nome)+'</strong>':''}! 🎉<br>Código confirmado. Vamos começar a reclamação.<br><br>Qual a <strong>empresa utilizadora</strong> onde trabalhaste?`);state.step='empresa';}else{await botReply('Código não encontrado. Verifica e tenta novamente, ou escreve <strong>"novo"</strong> para criar um registo.',{quickReplies:['Tentar novamente','Criar novo registo']});state.step='codigo_login_retry';}}catch(e){removeTyping();await botReply('Erro de ligação. Tenta novamente.');}break;}case 'codigo_login_retry':{if(/novo|criar|registo/i.test(inp)){await botReply('Qual é o teu <strong>NIF</strong>?');state.step='nif';}else{state.step='codigo_login';await processStep('codigo_login',inp);}break;}case 'nif':{if(!/^\d{9}$/.test(inp)){await botReply('O NIF deve ter exactamente 9 dígitos. Tenta novamente.');break;}state.nif=inp;await botReply('Qual o teu <strong>número de funcionário</strong>?');state.step='numFunc';break;}case 'numFunc':{state.numFunc=inp;addTyping();try{const snap=await colPortal.where('nif','==',state.nif).limit(20).get();const match=snap.docs.find(d=>d.data().numFunc===inp);removeTyping();if(match){state.trabalhador={id:match.id,...match.data()};state.nome=state.trabalhador.nome||'';await botReply(`Registo encontrado${state.nome?' — <strong>'+escHtml(state.nome)+'</strong>':''}.<br>O teu código de portal é: <strong>${match.id}</strong> (guarda-o para acessos futuros).<br><br>Qual a <strong>empresa utilizadora</strong>?`);state.step='empresa';}else{const codigo=Math.random().toString(36).slice(2,7).toUpperCase();const doc={codigoPublico:codigo,nif:state.nif,numFunc:state.numFunc,nome:'',criadoEm:Date.now(),ultimaReclamacao:null};await colPortal.doc(codigo).set(doc);state.trabalhador={id:codigo,...doc};await botReply(`Registo criado! 🎉<br>O teu <strong>código de portal</strong> é: <code style="background:var(--cyan-light);padding:2px 8px;border-radius:6px;color:var(--navy);font-weight:700;">${codigo}</code><br><span style="color:var(--amber);font-size:11px;">⚠️ Guarda este código — vais precisar nas próximas vezes.</span><br><br>Qual o teu <strong>nome completo</strong>?`);state.step='nome';}}catch(e){removeTyping();await botReply('Erro de ligação. Tenta novamente.');}break;}case 'nome':{if(inp.length<2){await botReply('Precisamos do nome completo.');break;}state.nome=inp;await botReply(`Obrigado, <strong>${escHtml(inp)}</strong>!<br>Qual a <strong>empresa utilizadora</strong> onde trabalhaste?`);state.step='empresa';break;}case 'empresa':{if(!inp){await botReply('Nome da empresa obrigatório.');break;}state.empresa=inp;await botReply('Qual a <strong>categoria profissional</strong>? (ex: Empregado de Mesa, Cozinheiro…)<br><span style="color:var(--muted);font-size:11px;">Ou escreve <em>saltar</em> para continuar.</span>');state.step='categoria';break;}case 'categoria':{state.categoria=/saltar|skip/i.test(inp)?'':inp;const escBtns=escritorios.map(e=>e.nome);await botReply('Qual o <strong>escritório</strong> associado?',{quickReplies:escBtns});state.step='escritorio';break;}case 'escritorio':{const found=escritorios.find(e=>e.nome.toLowerCase()===inp.toLowerCase()||e.id.toLowerCase()===inp.toLowerCase());state.escritorio=found?found.id:inp.toLowerCase();await botReply(`Agora os <strong>períodos reclamados</strong>.<br>Indica o <strong>mês e ano</strong> (ex: <em>Março 2026</em> ou <em>03/2026</em>).`);state.step='periodo_mes';state.periodoAtual={mes:null,mesNome:'',ano:null,dias:[],turnos:[],totalHoras:''};break;}case 'periodo_mes':{const parsed=parseMesAno(inp);if(!parsed){await botReply('Formato não reconhecido. Usa por exemplo: <em>Março 2026</em> ou <em>03/2026</em>.');break;}state.periodoAtual.mes=parsed.mes;state.periodoAtual.mesNome=MESES[parsed.mes];state.periodoAtual.ano=parsed.ano;await botReply(`Quais os <strong>dias</strong> de <strong>${MESES[parsed.mes]} ${parsed.ano}</strong>?<br>Podes escrever vários separados por vírgula ou intervalo:<br><span style="color:var(--muted);font-size:11px;">ex: <em>3, 5, 10-14, 22</em></span>`);state.step='periodo_dias';break;}case 'periodo_dias':{const dias=parseDias(inp);if(!dias.length){await botReply('Não consegui interpretar os dias. Usa vírgulas e/ou intervalos com traço (ex: 3, 5, 10-14).');break;}state.periodoAtual.dias=dias;await botReply(`${dias.length} dia(s) registado(s).<br><br>Indica o <strong>horário</strong> (entrada e saída). Ex: <em>08:00 - 16:30</em><br><span style="color:var(--muted);font-size:11px;">Ou escreve <em>saltar</em> se não aplicável.</span>`);state.step='periodo_horario';break;}case 'periodo_horario':{if(!/saltar|skip/i.test(inp)){const h=parseHorario(inp);if(h){state.periodoAtual.turnos=[{entrada:h.entrada,saida:h.saida,total:h.total}];state.periodoAtual.totalHoras=h.total;}}state.periodos.push({...state.periodoAtual});state.periodoAtual=null;await botReply(`Período adicionado ✓<br><strong>${state.periodos.length}</strong> período(s) registado(s) até agora.<br>Tens mais algum período para reclamar?`,{quickReplies:['Sim, mais um período','Não, continuar']});state.step='mais_periodos';break;}case 'mais_periodos':{if(/sim|mais|outro|adicionar/i.test(inp)){await botReply('Qual o próximo <strong>mês e ano</strong>?');state.periodoAtual={mes:null,mesNome:'',ano:null,dias:[],turnos:[],totalHoras:''};state.step='periodo_mes';}else{await botReply('Alguma <strong>nota adicional</strong> que queiras incluir?<br><span style="color:var(--muted);font-size:11px;">Ou escreve <em>saltar</em> para continuar.</span>');state.step='notas';}break;}case 'notas':{state.notas=/saltar|skip/i.test(inp)?'':inp;await botReply(`Queres <strong>anexar ficheiros</strong>? (contratos, folhas de ponto, capturas de ecrã…)<br>Usa o ícone 📎 abaixo para seleccionar ficheiros, e depois clica <em>Enviar</em>.<br><span style="color:var(--muted);font-size:11px;">Ou escreve <em>saltar</em> para continuar sem ficheiros.</span>`);state.step='ficheiros';break;}case 'ficheiros':case 'ficheiros_ok':{if(/saltar|skip|não|nao/i.test(inp)&&step!=='ficheiros_ok'){pendingFiles=[];renderFileChips();}await mostrarResumo();break;}case 'confirmacao':{if(/sim|confirmar|submeter|yes/i.test(inp)){await submeterReclamacao();}else{await botReply('Reclamação cancelada. Se quiseres recomeçar, actualiza a página.',{quickReplies:['Recomeçar']});state.step='done';}break;}case 'done':{if(/recomeçar|recomecar/i.test(inp))location.reload();else await botReply('A reclamação já foi submetida. Para uma nova reclamação, actualiza a página.');break;}default:await botReply('Não percebi. Podes repetir?');}}
async function handleQuickReply(label){addMsg('user',escHtml(label));await processStep(state.step,label);}
async function mostrarResumo(){const periodosTxt=state.periodos.map(p=>`<li><strong>${p.mesNome} ${p.ano}</strong> — ${p.dias.length} dia(s): ${p.dias.join(', ')}`+(p.totalHoras?` · ${p.totalHoras}`:'')+'</li>').join('');const filesTxt=pendingFiles.length?pendingFiles.map(f=>`<span class="summary-file">📎 ${escHtml(f.name)}</span>`).join(''):'<span style="color:var(--muted);font-size:11px;">Nenhum</span>';const html=`Revê os dados antes de submeter:<div class="summary-card"><div class="row"><span class="lbl">Nome</span><span class="val">${escHtml(state.nome)}</span></div><div class="row"><span class="lbl">NIF</span><span class="val">${escHtml(state.nif)}</span></div><div class="row"><span class="lbl">Nº Func.</span><span class="val">${escHtml(state.numFunc)}</span></div><hr class="divider"><div class="row"><span class="lbl">Empresa</span><span class="val">${escHtml(state.empresa)}</span></div>${state.categoria?`<div class="row"><span class="lbl">Categoria</span><span class="val">${escHtml(state.categoria)}</span></div>`:''} ${state.escritorio?`<div class="row"><span class="lbl">Escritório</span><span class="val">${escHtml(state.escritorio)}</span></div>`:''}<hr class="divider"><div class="row"><span class="lbl">Períodos</span><span class="val"><ul style="padding-left:14px">${periodosTxt}</ul></span></div>${state.notas?`<div class="row"><span class="lbl">Notas</span><span class="val">${escHtml(state.notas)}</span></div>`:''}<hr class="divider"><div class="row"><span class="lbl">Ficheiros</span><span class="val"><div class="summary-files">${filesTxt}</div></span></div></div>`;await botReply(html,{quickReplies:['✓ Confirmar e submeter','✕ Cancelar']});state.step='confirmacao';}
async function submeterReclamacao(){addTyping();try{const codigo=state.trabalhador?(state.trabalhador.codigoPublico||state.trabalhador.id):'';const resumoPeriodo=state.periodos.map(p=>`${p.dias.length} dia(s) — ${p.mesNome} ${p.ano}`).join(' | ');const docRef=await colRec.add({numFunc:state.numFunc,nif:state.nif,nome:state.nome,empresa:state.empresa,categoria:state.categoria,escritorio:state.escritorio,canal:'bot',notas:state.notas,periodos:state.periodos,resumoPeriodo,codigoPortal:codigo,estado:'nova',criadoPor:state.nome,criadoEm:Date.now(),historico:[{estado:'nova',nota:'Submetido via assistente de chat',por:state.nome,em:Date.now()}],ficheiros:[]});let ficheirosGuardados=[];if(pendingFiles.length){ficheirosGuardados=await uploadFiles(docRef.id);await docRef.update({ficheiros:ficheirosGuardados});}if(state.trabalhador){const updates={ultimaReclamacao:Date.now()};if(!state.trabalhador.nome&&state.nome)updates.nome=state.nome;await colPortal.doc(state.trabalhador.id).update(updates);}removeTyping();pendingFiles=[];renderFileChips();await botReply(`✅ <strong>Reclamação submetida com sucesso!</strong><br><br>Referência: <code style="background:var(--cyan-light);padding:2px 8px;border-radius:6px;color:var(--navy);font-weight:700;">${docRef.id.slice(0,8).toUpperCase()}</code><br>${ficheirosGuardados.length?`📎 ${ficheirosGuardados.length} ficheiro(s) guardado(s).<br>`:''}<br>A tua reclamação está agora com estado <strong>Nova</strong> e será analisada em breve.<br><br>Se precisares de submeter outra reclamação, actualiza a página.`);state.step='done';}catch(e){removeTyping();console.error(e);await botReply('❌ Erro ao submeter. Por favor tenta novamente.',{quickReplies:['Tentar novamente']});state.step='confirmacao';}}
function parseMesAno(txt){const byName=txt.match(/([a-záéíóúàâêôãõçA-Z]+)\s*(?:de\s*)?(\d{4})/i);if(byName){const mesIdx=MESES.findIndex(m=>m.toLowerCase().startsWith(byName[1].toLowerCase().slice(0,3)));if(mesIdx>=0)return{mes:mesIdx,ano:parseInt(byName[2])};}const byNum=txt.match(/(\d{1,2})[\/\-](\d{4})/);if(byNum)return{mes:parseInt(byNum[1])-1,ano:parseInt(byNum[2])};return null;}
function parseDias(txt){const dias=new Set();const parts=txt.split(/[,;]+/);parts.forEach(p=>{p=p.trim();const range=p.match(/^(\d{1,2})\s*[-–]\s*(\d{1,2})$/);if(range){for(let i=parseInt(range[1]);i<=parseInt(range[2]);i++)dias.add(i);}else{const d=parseInt(p);if(!isNaN(d)&&d>=1&&d<=31)dias.add(d);}});return[...dias].sort((a,b)=>a-b);}
function parseHorario(txt){const m=txt.match(/(\d{1,2})[h:](\d{0,2})\s*[-–\s]+\s*(\d{1,2})[h:](\d{0,2})/i);if(!m)return null;const eh=parseInt(m[1]),em=parseInt(m[2]||0),sh=parseInt(m[3]),sm=parseInt(m[4]||0);const mins=(sh*60+sm)-(eh*60+em);if(mins<=0)return null;const h=Math.floor(mins/60),min=mins%60;return{entrada:`${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}`,saida:`${String(sh).padStart(2,'0')}:${String(sm).padStart(2,'0')}`,total:min?`${h}h${String(min).padStart(2,'0')}`:`${h}h`};}
async function sendMessage(){const input=document.getElementById('msgInput');const text=input.value.trim();if(!text&&!pendingFiles.length)return;input.value='';input.style.height='auto';document.getElementById('btnSend').disabled=true;await handleInput(text);document.getElementById('btnSend').disabled=false;}
document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
document.getElementById('msgInput').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});
window.addEventListener('load',()=>start());
</script>
