<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reclamações de Horas — Portal do Trabalhador</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Manrope:wght@600;700;800&display=swap');
:root {
  --bg:#f4f4f6; --surface:#fff; --surface2:#f7f7f9; --border:#e2e2e8;
  --text:#1a1a22; --muted:#8888a0; --accent:#2563eb;
  --green:#16a34a;  --green-bg:#f0fdf4;  --green-border:#bbf7d0;
  --blue:#2563eb;   --blue-bg:#eff6ff;   --blue-border:#bfdbfe;
  --red:#dc2626;    --red-bg:#fef2f2;    --red-border:#fecaca;
  --amber:#d97706;  --amber-bg:#fffbeb;  --amber-border:#fde68a;
  --purple:#7c3aed; --purple-bg:#f5f3ff; --purple-border:#ddd6fe;
  --teal:#0d9488;   --teal-bg:#f0fdfa;   --teal-border:#99f6e4;
  --gray-bg:#f4f4f6; --gray-border:#e2e2e8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;pointer-events:none;z-index:0;}
.wrap{max-width:920px;margin:0 auto;padding:32px 20px 64px;position:relative;z-index:1;}

/* HEADER */
.pub-header{text-align:center;margin-bottom:32px;}
.pub-logo{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;background:var(--text);border-radius:14px;margin-bottom:16px;}
.pub-logo svg{width:24px;height:24px;color:#fff;}
.pub-title{font-family:'Manrope',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.03em;margin-bottom:4px;}
.pub-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 28px;box-shadow:0 4px 24px rgba(0,0,0,.07);}
@media(max-width:480px){.card{padding:24px 18px;}}

/* FORM */
.field{margin-bottom:16px;}
.field-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:8px 10px;border-radius:6px;outline:none;transition:border-color .15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-input::placeholder,.form-textarea::placeholder{color:#bbb;}
.form-input[readonly]{background:var(--bg);color:var(--muted);cursor:default;}
.form-textarea{resize:vertical;min-height:72px;line-height:1.6;}
.req{color:var(--red);margin-left:2px;}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
.section-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){.form-grid{grid-template-columns:1fr;}}
.form-grid .full{grid-column:1/-1;}

/* BTNS */
.btn{border:none;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:.09em;transition:all .15s;padding:10px 18px;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{opacity:.82;}
.btn-primary{background:var(--text);color:#fff;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-sm{padding:5px 11px;font-size:10px;}
.btn-block{width:100%;justify-content:center;margin-top:4px;}

/* ALERTS */
.alert{border-radius:10px;padding:12px 16px;font-size:11px;margin-bottom:16px;display:none;line-height:1.6;}
.alert.show{display:flex;align-items:flex-start;gap:10px;}
.alert-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.alert-text{flex:1;}
.alert-info{background:var(--blue-bg);border:1px solid var(--blue-border);color:var(--blue);}
.alert-err{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red);}
.alert-ok{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);}

/* OR DIVIDER */
.or-divider{display:flex;align-items:center;gap:10px;margin:20px 0;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* CÓDIGO BOX (para mostrar após registo) */
.codigo-reveal{background:var(--surface2);border:2px solid var(--blue-border);border-radius:12px;padding:18px 20px;margin-bottom:16px;display:none;}
.codigo-reveal.show{display:block;}
.codigo-reveal-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);margin-bottom:10px;}
.codigo-val-big{font-family:'Manrope',sans-serif;font-size:22px;font-weight:800;letter-spacing:.15em;color:var(--text);display:block;margin-bottom:6px;}
.codigo-aviso{font-size:10px;color:var(--amber);margin-top:8px;display:flex;align-items:center;gap:6px;}

/* LISTA HEADER */
.lista-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.lista-header-info{flex:1;min-width:0;}
.lista-nome{font-family:'Manrope',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lista-codigo-row{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
.lista-codigo-val{font-weight:500;letter-spacing:.08em;color:var(--text);}
.btn-copy{background:none;border:1px solid var(--border);border-radius:5px;font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;padding:2px 8px;color:var(--muted);transition:all .15s;}
.btn-copy:hover{border-color:var(--accent);color:var(--accent);}
.btn-nova-rec{padding:8px 14px;background:var(--text);color:#fff;border:none;border-radius:10px;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-nova-rec:hover{opacity:.8;}
.btn-sair{background:none;border:1px solid var(--border);border-radius:8px;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.07em;cursor:pointer;padding:7px 13px;color:var(--muted);transition:all .15s;white-space:nowrap;}
.btn-sair:hover{border-color:var(--red);color:var(--red);}

/* REC CARDS */
.rec-list{display:flex;flex-direction:column;gap:6px;}
.rec-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);position:relative;overflow:hidden;transition:box-shadow .15s;}
.rec-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.09);}
.rec-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:12px 0 0 12px;}
.rec-card.estado-nova::before{background:var(--gray-border);}
.rec-card.estado-verificacao::before{background:var(--amber);}
.rec-card.estado-enviada::before{background:var(--blue);}
.rec-card.estado-confirmada::before{background:var(--purple);}
.rec-card.estado-aguardaproc::before,.rec-card.estado-aguarda-proc::before{background:var(--teal);}
.rec-card.estado-paga::before{background:var(--green);}
.rec-card.estado-semfundamento::before,.rec-card.estado-sem-fundamento::before{background:var(--muted);}
.rec-card.estado-negada::before{background:var(--red);}
.rec-card.estado-paga{opacity:.72;}
.rec-card.estado-negada{opacity:.6;}
.card-header{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;user-select:none;}
.card-nome{font-size:12px;font-weight:500;}
.card-sub{font-size:10px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chevron{width:14px;height:14px;color:var(--muted);flex-shrink:0;transition:transform .2s;}
.chevron.open{transform:rotate(180deg);}
.estado-pill{font-size:9px;text-transform:uppercase;letter-spacing:.07em;padding:3px 9px;border-radius:10px;font-weight:500;flex-shrink:0;white-space:nowrap;}
.estado-pill.nova{background:var(--gray-bg);color:var(--muted);border:1px solid var(--gray-border);}
.estado-pill.verificacao{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.estado-pill.enviada{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);}
.estado-pill.confirmada{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border);}
.estado-pill.aguardaproc,.estado-pill.aguarda-proc{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-border);}
.estado-pill.paga{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.estado-pill.semfundamento,.estado-pill.sem-fundamento{background:var(--gray-bg);color:var(--muted);border:1px solid var(--gray-border);}
.estado-pill.negada{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.card-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border);}
.card-body.open{display:block;}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:14px;}
.detail-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.detail-item.span-full{grid-column:1/-1;}
.detail-item-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;}
.detail-item-val{font-size:11px;font-weight:500;color:var(--text);word-break:break-word;}
.periodos-table{width:100%;border-collapse:collapse;font-size:10px;margin-top:6px;}
.periodos-table th{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:4px 8px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
.periodos-table td{padding:6px 8px;border-bottom:1px solid var(--surface2);vertical-align:top;}
.periodos-table tr:last-child td{border-bottom:none;}
.dias-chips{display:flex;flex-wrap:wrap;gap:3px;}
.dia-chip{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);border-radius:4px;padding:1px 5px;font-size:9px;font-weight:600;}

/* HISTÓRICO */
.card-historico{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.historico-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;}
.historico-list{display:flex;flex-direction:column;}
.historico-item{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--surface2);}
.historico-item:last-child{border-bottom:none;}
.historico-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;background:var(--border);}
.historico-dot.nova{background:var(--muted);}
.historico-dot.verificacao{background:var(--amber);}
.historico-dot.enviada{background:var(--blue);}
.historico-dot.confirmada{background:var(--purple);}
.historico-dot.aguardaproc,.historico-dot.aguarda-proc{background:var(--teal);}
.historico-dot.paga{background:var(--green);}
.historico-dot.negada{background:var(--red);}
.historico-content{flex:1;min-width:0;}
.historico-estado{font-size:10px;font-weight:500;color:var(--text);}
.historico-nota{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.5;}
.historico-meta{font-size:9px;color:#bbb;margin-top:2px;}

/* EMPTY */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-state svg{width:36px;height:36px;opacity:.3;margin-bottom:12px;}
.empty-state p{font-size:12px;}

/* PERÍODO BLOCKS */
.periodos-wrap{display:flex;flex-direction:column;gap:12px;}
.periodo-block{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;}
.periodo-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.periodo-block-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:500;}
.btn-remove-periodo{background:none;border:none;cursor:pointer;color:#ccc;font-size:18px;padding:0 4px;line-height:1;transition:color .15s;}
.btn-remove-periodo:hover{color:var(--red);}
.periodo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
@media(max-width:500px){.periodo-grid{grid-template-columns:1fr 1fr;}}
.cal-wrap{position:relative;}
.cal-trigger{width:100%;background:var(--surface);border:1px solid var(--border);color:#bbb;font-family:'DM Mono',monospace;font-size:11px;padding:8px 10px;border-radius:6px;cursor:pointer;text-align:left;transition:border-color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-trigger:hover{border-color:var(--accent);}
.cal-trigger.open{border-color:var(--accent);}
.cal-trigger.has-days{color:var(--text);}
.cal-popup{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.14);padding:14px;min-width:268px;}
.cal-popup.open{display:block;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-nav-btn{background:none;border:1px solid var(--border);border-radius:6px;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;}
.cal-nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.cal-month-label{font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);text-align:center;padding:3px 0;}
.cal-day{font-size:11px;text-align:center;padding:5px 2px;border-radius:6px;cursor:pointer;transition:all .1s;user-select:none;border:1px solid transparent;}
.cal-day:hover:not(.empty){background:var(--surface2);border-color:var(--border);}
.cal-day.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
.cal-day.other-month{color:#ccc;cursor:default;}
.cal-day.today{font-weight:700;}
.cal-footer{margin-top:10px;display:flex;align-items:center;justify-content:space-between;}
.cal-hint{font-size:9px;color:var(--muted);}
.cal-clear{font-size:9px;color:var(--red);background:none;border:none;cursor:pointer;padding:0;}
.btn-add-periodo{display:flex;align-items:center;gap:6px;padding:9px 14px;border:1px dashed var(--border);background:transparent;font-family:'DM Mono',monospace;font-size:10px;border-radius:8px;cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;transition:all .15s;width:100%;justify-content:center;margin-top:6px;}
.btn-add-periodo:hover{border-color:var(--accent);color:var(--accent);background:var(--blue-bg);}

/* TURNOS */
.turnos-wrap{display:flex;flex-direction:column;gap:6px;margin-top:10px;}
.turno-row{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.turno-num{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);white-space:nowrap;min-width:44px;}
.turno-fields{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap;}
.turno-sep{font-size:11px;color:var(--muted);}
.turno-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:6px 8px;border-radius:6px;outline:none;transition:border-color .15s;width:90px;}
.turno-input:focus{border-color:var(--accent);}
.btn-rm-turno{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;padding:0 2px;line-height:1;flex-shrink:0;transition:color .15s;}
.btn-rm-turno:hover{color:var(--red);}
.btn-add-turno{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px dashed var(--border);background:transparent;font-family:'DM Mono',monospace;font-size:9px;border-radius:6px;cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;transition:all .15s;margin-top:4px;width:fit-content;}
.btn-add-turno:hover{border-color:var(--accent);color:var(--accent);}
.turno-extra{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.turno-extra-label{font-size:9px;color:var(--muted);white-space:nowrap;}
.turno-input-sm{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:10px;padding:4px 6px;border-radius:6px;outline:none;transition:border-color .15s;width:64px;}
.turno-input-sm:focus{border-color:var(--accent);}
.periodo-totais{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.total-chip{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;font-size:10px;}
.total-chip.horas{background:var(--blue-bg);border:1px solid var(--blue-border);color:var(--blue);}
.total-chip.noturnas{background:var(--purple-bg);border:1px solid var(--purple-border);color:var(--purple);}
.total-chip.feriado{background:var(--amber-bg);border:1px solid var(--amber-border);color:var(--amber);}
.total-chip-label{font-size:9px;text-transform:uppercase;letter-spacing:.07em;opacity:.7;}

/* CANAL */
.canal-row{display:flex;gap:6px;flex-wrap:wrap;}
.canal-pill{padding:6px 12px;border:1px solid var(--border);background:transparent;font-family:'DM Mono',monospace;font-size:10px;border-radius:6px;cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;transition:all .15s;}
.canal-pill.sel{background:var(--blue-bg);border-color:var(--blue);color:var(--blue);}
.canal-pill:not(.sel):hover{border-color:#aaa;color:var(--text);}

/* FORM PANEL */
.form-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.form-panel-title{font-family:'Manrope',sans-serif;font-size:14px;font-weight:700;letter-spacing:-.01em;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;font-size:11px;padding:10px 20px;border-radius:20px;opacity:0;transition:all .25s;pointer-events:none;z-index:600;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* VISTAS */
.vista{display:none;}
.vista.active{display:block;}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="pub-header">
    <div class="pub-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="4" width="18" height="16" rx="2"/>
        <path d="M3 10h18M8 2v4M16 2v4"/>
        <circle cx="8" cy="15" r="1" fill="currentColor" stroke="none"/>
        <circle cx="12" cy="15" r="1" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="15" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <div class="pub-title">Reclamações de Horas</div>
    <div class="pub-sub">Portal do Trabalhador</div>
  </div>

  <!-- ══ VISTA 1: ENTRADA ══ -->
  <div class="vista active" id="vistaEntrada">
    <div class="card">
      <div class="section-label">Identificação</div>
      <div id="alertEntrada" class="alert"></div>
      <div id="codigoReveal" class="codigo-reveal">
        <div class="codigo-reveal-title">O teu código de acesso</div>
        <span class="codigo-val-big" id="codigoValBig">—</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">
          <button class="btn btn-sm" id="btnCopiarCodigoReveal" onclick="copiarCodigoReveal()">📋 Copiar código</button>
        </div>
        <div class="codigo-aviso">⚠ Guarda este código — precisarás dele para aceder novamente.</div>
        <div style="margin-top:14px;">
          <button class="btn btn-primary btn-sm" onclick="continuarAposRegisto()">Continuar →</button>
        </div>
      </div>
      <div id="formEntrada">
        <div class="field">
          <label class="field-label">NIF<span class="req">*</span></label>
          <input type="text" class="form-input" id="inNif" placeholder="ex: 123456789" maxlength="9" autocomplete="off" inputmode="numeric">
        </div>
        <div class="field">
          <label class="field-label">Nº de colaborador<span class="req">*</span></label>
          <input type="text" class="form-input" id="inNumFunc" placeholder="ex: 12345" autocomplete="off">
        </div>
        <button class="btn btn-primary btn-block" onclick="entrarOuRegistar()">Entrar / Registar</button>
        <div class="or-divider">ou</div>
        <div class="section-label">Já tenho código</div>
        <div class="field">
          <label class="field-label">Código do portal</label>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBbTDfCCC9o5oxMSMRsvCUC50Iu6L0aqT8",
  authDomain:"calendario-trabalho-39a6c.firebaseapp.com",
  projectId:"calendario-trabalho-39a6c",
  storageBucket:"calendario-trabalho-39a6c.firebasestorage.app",
  messagingSenderId:"596069405321",
  appId:"1:596069405321:web:275bb9da220206d3da6c58"
});
const db = firebase.firestore();
const colPortal = db.collection('trabalhadores_portal');
const colRec    = db.collection('reclamacoes_horas');

// ── STATE ──
let trabalhador = null;
let recsList    = [];
let selCanalVal = 'email';
const expandedIds = new Set();

// ── RATE LIMITING (cliente) ─────────────────────────────
// Máximo de 3 submissões por sessão, com cooldown de 60 s entre submissões.
// Não substitui regras de segurança no servidor, mas reduz abusos acidentais.
const RATE_LIMIT_MAX       = 3;   // submissões por sessão
const RATE_LIMIT_COOLDOWN  = 60;  // segundos entre submissões
let _submitCount     = 0;
let _lastSubmitTime  = 0;

const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
               'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS_SEMANA = ['D','S','T','Q','Q','S','S'];
const ESTADO_LABEL = {
  nova:'Nova', verificacao:'Em Verificação', enviada:'Enviada à Empresa',
  confirmada:'Confirmada', 'aguarda-proc':'Aguarda Processamento',
  paga:'Paga', 'sem-fundamento':'Sem Fundamento', negada:'Negada pela Empresa'
};
const CANAL_LABEL = {email:'📧 Email',telefone:'📞 Telefone',mensagem:'💬 Mensagem',presencial:'🧑 Presencial'};

// ── VISTAS ──
function mostrarVista(id) {
  document.querySelectorAll('.vista').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function mostrarVistaLista() {
  mostrarVista('vistaLista');
  carregarReclamacoes();
}
function mostrarVistaForm() {
  resetForm();
  adicionarPeriodo();
  mostrarVista('vistaForm');
}
function sair() {
  trabalhador = null;
  recsList = [];
  expandedIds.clear();
  document.getElementById('inNif').value    = '';
  document.getElementById('inNumFunc').value = '';
  document.getElementById('inCodigo').value  = '';
  hideAlert('alertEntrada');
  document.getElementById('codigoReveal').classList.remove('show');
  document.getElementById('formEntrada').style.display = '';
  mostrarVista('vistaEntrada');
}

// ── ALERTAS ──
function showAlert(elId, type, html) {
  const el = document.getElementById(elId);
  const icon = type === 'err' ? '⚠' : type === 'ok' ? '✓' : 'ℹ';
  el.className = 'alert alert-' + type + ' show';
  el.innerHTML = '<span class="alert-icon">' + icon + '</span><span class="alert-text">' + html + '</span>';
}
function hideAlert(elId) {
  document.getElementById(elId).className = 'alert';
}

// ── CÓDIGO ──
function gerarCodigo() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let r = 'RH-';
  for (let i = 0; i < 6; i++) r += chars.charAt(Math.floor(Math.random() * chars.length));
  return r;
}
function copiarCodigo() {
  const c = (trabalhador && (trabalhador.codigoPublico || trabalhador.id)) || '';
  navigator.clipboard.writeText(c).then(() => toast('Código copiado!')).catch(() => toast(c));
}
function copiarCodigoReveal() {
  const c = document.getElementById('codigoValBig').textContent;
  navigator.clipboard.writeText(c).then(() => toast('Código copiado!')).catch(() => toast(c));
}
function continuarAposRegisto() {
  document.getElementById('codigoReveal').classList.remove('show');
  document.getElementById('formEntrada').style.display = '';
  onEntrou();
}

// ── AUTENTICAÇÃO ──
async function entrarOuRegistar() {
  const nif     = document.getElementById('inNif').value.trim();
  const numFunc = document.getElementById('inNumFunc').value.trim();
  if (!nif || !numFunc) {
    showAlert('alertEntrada', 'err', 'NIF e nº de colaborador são obrigatórios.');
    return;
  }
  showAlert('alertEntrada', 'info', 'A verificar…');
  try {
    // Query by NIF, filter numFunc client-side (avoids composite index)
    const snap = await colPortal.where('nif', '==', nif).limit(20).get();
    const match = snap.docs.find(d => d.data().numFunc === numFunc);
    if (match) {
      trabalhador = { id: match.id, ...match.data() };
      hideAlert('alertEntrada');
      onEntrou();
    } else {
      // Novo registo
      const codigo = gerarCodigo();
      const doc = { codigoPublico: codigo, nif, numFunc, nome: '', criadoEm: Date.now(), ultimaReclamacao: null };
      await colPortal.doc(codigo).set(doc);
      trabalhador = { id: codigo, ...doc };
      hideAlert('alertEntrada');
      // Mostrar código
      document.getElementById('codigoValBig').textContent = codigo;
      document.getElementById('codigoReveal').classList.add('show');
      document.getElementById('formEntrada').style.display = 'none';
    }
  } catch(e) {
    console.error(e);
    showAlert('alertEntrada', 'err', 'Erro de ligação. Tenta novamente.');
  }
}

async function entrarComCodigo() {
  const codigo = document.getElementById('inCodigo').value.trim().toUpperCase();
  if (!codigo) {
    showAlert('alertEntrada', 'err', 'Introduz o teu código de portal.');
    return;
  }
  showAlert('alertEntrada', 'info', 'A verificar…');
  try {
    const snap = await colPortal.doc(codigo).get();
    if (snap.exists) {
      trabalhador = { id: snap.id, ...snap.data() };
      hideAlert('alertEntrada');
      onEntrou();
    } else {
      showAlert('alertEntrada', 'err', 'Código não encontrado. Verifica e tenta novamente.');
    }
  } catch(e) {
    console.error(e);
    showAlert('alertEntrada', 'err', 'Erro de ligação. Tenta novamente.');
  }
}

function onEntrou() {
  const codigo = trabalhador.codigoPublico || trabalhador.id;
  document.getElementById('listaNome').textContent = trabalhador.nome || 'Trabalhador';
  document.getElementById('listaCodigo').textContent = codigo;
  prefillForm();
  mostrarVistaLista();
}

// ── LISTA ──
function carregarReclamacoes() {
  const listEl = document.getElementById('recList');
  listEl.innerHTML = '<div style="padding:20px;text-align:center;font-size:11px;color:var(--muted);">A carregar…</div>';
  const codigo = trabalhador.codigoPublico || trabalhador.id;
  colRec.where('codigoPortal', '==', codigo).limit(20).get()
    .then(snap => {
      recsList = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (b.criadoEm || 0) - (a.criadoEm || 0));
      renderLista();
    })
    .catch(e => {
      console.error(e);
      listEl.innerHTML = '<div style="padding:20px;text-align:center;font-size:11px;color:var(--red);">Erro ao carregar. Tenta novamente.</div>';
    });
}

function renderLista() {
  const listEl = document.getElementById('recList');
  if (!recsList.length) {
    listEl.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
      <p>Ainda não tens reclamações submetidas.</p>
    </div>`;
    return;
  }
  listEl.innerHTML = recsList.map(r => renderCard(r)).join('');
}

function renderCard(r) {
  const eKey   = r.estado || 'nova';
  const eLabel = ESTADO_LABEL[eKey] || eKey;
  const ePill  = estadoPillClass(eKey);
  const eCard  = estadoClass(eKey);
  const exp    = expandedIds.has(r.id);
  const hist   = r.historico || [];
  const periodos = r.periodos || [];

  const periodosHTML = periodos.length ? `
    <table class="periodos-table">
      <thead><tr><th>Mês/Ano</th><th>Dias</th><th>Turnos</th><th>Total</th><th>🌙 Noc.</th><th>📅 Fer.</th></tr></thead>
      <tbody>${periodos.map(p => {
        const turnos = p.turnos || [];
        const turnosHTML = turnos.length
          ? turnos.map((t, i) => `<span style="white-space:nowrap;margin-right:8px">${turnos.length > 1 ? 'T' + (i+1) + ': ' : ''}${t.entrada||'—'} → ${t.saida||'—'}${t.total ? ' (' + t.total + ')' : ''}</span>`).join('')
          : '—';
        return `<tr>
          <td>${p.mesNome || MESES[p.mes] || ''} ${p.ano}</td>
          <td><div class="dias-chips">${(p.dias||[]).map(d => `<span class="dia-chip">${d}</span>`).join('')}</div></td>
          <td style="font-size:10px">${turnosHTML}</td>
          <td>${p.totalHoras || '—'}</td>
          <td>${p.totalNoturnas || '—'}</td>
          <td>${p.totalFeriado || '—'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>` : '';

  return `<div class="rec-card estado-${eCard}" id="card-${r.id}">
    <div class="card-header" onclick="toggleCard('${r.id}')">
      <div>
        <div class="card-nome">${escHtml(r.empresa || '—')}${r.categoria ? `<span style="font-size:10px;color:var(--muted);font-weight:400;margin-left:8px;">${escHtml(r.categoria)}</span>` : ''}</div>
        <div class="card-sub">${escHtml(r.resumoPeriodo || '—')} · ${fmtData(r.criadoEm)}</div>
      </div>
      <span class="estado-pill ${ePill}">${eLabel}</span>
      <svg class="chevron ${exp ? 'open' : ''}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6l4 4 4-4"/></svg>
    </div>
    <div class="card-body ${exp ? 'open' : ''}" id="body-${r.id}">
      <div class="detail-grid">
        ${periodos.length ? `<div class="detail-item span-full"><div class="detail-item-label">Períodos reclamados</div>${periodosHTML}</div>` : ''}
      </div>
      ${hist.length ? `<div class="card-historico">
        <div class="historico-label">Histórico</div>
        <div class="historico-list">${hist.map(h => {
          const hc = estadoPillClass(h.estado || 'nova');
          return `<div class="historico-item">
            <div class="historico-dot ${hc}"></div>
            <div class="historico-content">
              <div class="historico-estado">${ESTADO_LABEL[h.estado] || h.estado}</div>
              ${h.nota ? `<div class="historico-nota">${escHtml(h.nota)}</div>` : ''}
              <div class="historico-meta">${fmtDataHora(h.em)}</div>
            </div>
          </div>`;
        }).join('')}</div>
      </div>` : ''}
    </div>
  </div>`;
}

function toggleCard(id) {
  if (expandedIds.has(id)) expandedIds.delete(id); else expandedIds.add(id);
  renderLista();
}

// ── PERÍODO BLOCKS ──
let periodoCount = 0;
const PS = {};

function adicionarPeriodo(d) {
  const id  = 'p' + (++periodoCount);
  const now = new Date();
  PS[id] = {
    mes: d ? d.mes : now.getMonth(),
    ano: d ? d.ano : now.getFullYear(),
    diasSel: new Set(d ? d.dias : []),
    calOpen: false,
    calViewMes: d ? d.mes : now.getMonth(),
    calViewAno: d ? d.ano : now.getFullYear(),
    rangeStart: null
  };
  const wrap = document.getElementById('periodosWrap');
  const div  = document.createElement('div');
  div.className = 'periodo-block';
  div.id = 'block-' + id;
  div.innerHTML = buildBlockHTML(id, d);
  wrap.appendChild(div);
  if (d) updateTrigger(id);
  if (d && d.turnos && d.turnos.length) d.turnos.forEach(t => adicionarTurno(id, t));
  else adicionarTurno(id);
  syncRemoveBtns();
}

function buildBlockHTML(id, d) {
  const s = PS[id];
  const mesOpts = MESES.map((m, i) => `<option value="${i}" ${i === s.mes ? 'selected' : ''}>${m}</option>`).join('');
  const tot = d ? (d.totalHoras || '') : '';
  return `
    <div class="periodo-block-header">
      <span class="periodo-block-title">Período</span>
      <button class="btn-remove-periodo" onclick="removerPeriodo('${id}')" title="Remover">×</button>
    </div>
    <div class="periodo-grid">
      <div>
        <label class="field-label">Dias<span class="req">*</span></label>
        <div class="cal-wrap" id="cw-${id}">
          <button type="button" class="cal-trigger" id="ct-${id}" onclick="toggleCal('${id}')">Selecionar dias…</button>
          <div class="cal-popup" id="cp-${id}">
            <div class="cal-nav">
              <button class="cal-nav-btn" onclick="calNav('${id}',-1)"><svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 12L6 8l4-4"/></svg></button>
              <span class="cal-month-label" id="cm-${id}"></span>
              <button class="cal-nav-btn" onclick="calNav('${id}',1)"><svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 12l4-4-4-4"/></svg></button>
            </div>
            <div class="cal-grid" id="cg-${id}"></div>
            <div class="cal-footer">
              <span class="cal-hint">Clique · Shift+clique para intervalo</span>
              <button class="cal-clear" onclick="calClear('${id}')">Limpar</button>
            </div>
          </div>
        </div>
      </div>
      <div>
        <label class="field-label">Mês</label>
        <select class="form-select" id="mes-${id}" onchange="onMesAno('${id}')">${mesOpts}</select>
      </div>
      <div>
        <label class="field-label">Ano</label>
        <input type="number" class="form-input" id="ano-${id}" value="${s.ano}" min="2020" max="2035" onchange="onMesAno('${id}')">
      </div>
    </div>
    <div style="margin-top:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <label class="field-label" style="margin:0">Turnos</label>
        <button class="btn-add-turno" onclick="adicionarTurno('${id}')">
          <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v12M2 8h12"/></svg>
          Adicionar turno
        </button>
      </div>
      <div class="turnos-wrap" id="turnos-${id}"></div>
    </div>
    <div class="periodo-totais">
      <div class="total-chip horas"><span class="total-chip-label">Total</span><input type="text" class="turno-input-sm" id="th-${id}" value="${tot}" placeholder="—" style="width:70px;font-weight:600;" autocomplete="off" title="Total horas (editável)"></div>
      <div class="total-chip noturnas"><span class="total-chip-label">🌙 Noturnas</span><input type="text" class="turno-input-sm" id="thn-${id}" placeholder="—" style="width:64px;" autocomplete="off" readonly></div>
      <div class="total-chip feriado"><span class="total-chip-label">📅 Feriado</span><input type="text" class="turno-input-sm" id="thf-${id}" placeholder="—" style="width:64px;" autocomplete="off" readonly></div>
    </div>`;
}

function removerPeriodo(id) {
  if (document.querySelectorAll('.periodo-block').length <= 1) { toast('Tem de existir pelo menos um período.'); return; }
  document.getElementById('block-' + id).remove();
  delete PS[id];
  syncRemoveBtns();
}
function syncRemoveBtns() {
  const bl = document.querySelectorAll('.periodo-block');
  bl.forEach(b => { const btn = b.querySelector('.btn-remove-periodo'); if (btn) btn.style.display = bl.length > 1 ? '' : 'none'; });
}
function onMesAno(id) {
  const s = PS[id];
  s.mes = parseInt(document.getElementById('mes-' + id).value);
  s.ano = parseInt(document.getElementById('ano-' + id).value) || new Date().getFullYear();
  s.calViewMes = s.mes; s.calViewAno = s.ano;
  s.diasSel.clear(); s.rangeStart = null;
  updateTrigger(id);
  if (s.calOpen) renderCal(id);
}

// ── CALENDÁRIO ──
function toggleCal(id) {
  Object.keys(PS).forEach(k => { if (k !== id && PS[k].calOpen) closeCal(k); });
  const s = PS[id]; s.calOpen = !s.calOpen;
  document.getElementById('cp-' + id).classList.toggle('open', s.calOpen);
  document.getElementById('ct-' + id).classList.toggle('open', s.calOpen);
  if (s.calOpen) renderCal(id);
}
function closeCal(id) {
  if (!PS[id]) return;
  PS[id].calOpen = false;
  document.getElementById('cp-' + id)?.classList.remove('open');
  document.getElementById('ct-' + id)?.classList.remove('open');
}
function calNav(id, dir) {
  const s = PS[id]; s.calViewMes += dir;
  if (s.calViewMes < 0)  { s.calViewMes = 11; s.calViewAno--; }
  if (s.calViewMes > 11) { s.calViewMes = 0;  s.calViewAno++; }
  renderCal(id);
}
function renderCal(id) {
  const s = PS[id];
  document.getElementById('cm-' + id).textContent = MESES[s.calViewMes] + ' ' + s.calViewAno;
  const first = new Date(s.calViewAno, s.calViewMes, 1).getDay();
  const dim   = new Date(s.calViewAno, s.calViewMes + 1, 0).getDate();
  const td    = new Date();
  let html = DIAS_SEMANA.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < first; i++) html += `<div class="cal-day other-month empty"></div>`;
  for (let d = 1; d <= dim; d++) {
    const sel   = s.diasSel.has(d);
    const today = d === td.getDate() && s.calViewMes === td.getMonth() && s.calViewAno === td.getFullYear();
    html += `<div class="cal-day${sel ? ' sel' : ''}${today ? ' today' : ''}" onclick="dayClick('${id}',${d},event)">${d}</div>`;
  }
  document.getElementById('cg-' + id).innerHTML = html;
}
function dayClick(id, day, evt) {
  const s = PS[id];
  if (evt.shiftKey && s.rangeStart !== null) {
    const from = Math.min(s.rangeStart, day), to = Math.max(s.rangeStart, day);
    const dim  = new Date(s.calViewAno, s.calViewMes + 1, 0).getDate();
    for (let d = from; d <= Math.min(to, dim); d++) s.diasSel.add(d);
    s.rangeStart = null;
  } else {
    if (s.diasSel.has(day)) { s.diasSel.delete(day); s.rangeStart = null; }
    else { s.diasSel.add(day); s.rangeStart = day; }
  }
  document.getElementById('mes-' + id).value = s.calViewMes;
  document.getElementById('ano-' + id).value = s.calViewAno;
  s.mes = s.calViewMes; s.ano = s.calViewAno;
  updateTrigger(id); renderCal(id);
}
function calClear(id) { PS[id].diasSel.clear(); PS[id].rangeStart = null; updateTrigger(id); renderCal(id); }
function updateTrigger(id) {
  const s = PS[id], btn = document.getElementById('ct-' + id); if (!btn) return;
  const dias = [...s.diasSel].sort((a, b) => a - b);
  if (!dias.length) { btn.textContent = 'Selecionar dias…'; btn.classList.remove('has-days'); }
  else { btn.textContent = dias.length === 1 ? `Dia ${dias[0]}` : `${dias.length} dias: ${dias.slice(0, 5).join(', ')}${dias.length > 5 ? ' …' : ''}`; btn.classList.add('has-days'); }
}
document.addEventListener('click', e => {
  Object.keys(PS).forEach(id => {
    if (!PS[id].calOpen) return;
    const w = document.getElementById('cw-' + id);
    if (w && !w.contains(e.target)) closeCal(id);
  });
});

// ── TURNOS ──
let turnoCount = 0;
function adicionarTurno(pid, d) {
  const tid  = 't' + (++turnoCount);
  const wrap = document.getElementById('turnos-' + pid);
  if (!wrap) return;
  const row = document.createElement('div');
  row.className = 'turno-row'; row.id = 'tr-' + tid;
  row.innerHTML = `
    <span class="turno-num">Turno</span>
    <div class="turno-fields">
      <label class="field-label" style="margin:0;white-space:nowrap">Entrada</label>
      <input type="time" class="turno-input" id="te-${tid}" value="${d ? d.entrada : ''}" oninput="calcTurno('${pid}','${tid}')">
      <span class="turno-sep">→</span>
      <label class="field-label" style="margin:0;white-space:nowrap">Saída</label>
      <input type="time" class="turno-input" id="ts-${tid}" value="${d ? d.saida : ''}" oninput="calcTurno('${pid}','${tid}')">
      <span class="turno-sep" style="color:var(--muted);font-size:10px">=</span>
      <input type="text" class="turno-input" id="tt-${tid}" value="${d ? d.total : ''}" placeholder="—" style="max-width:64px;color:var(--blue);" autocomplete="off" title="Total (editável)">
      <span class="turno-sep" style="width:1px;height:16px;background:var(--border);margin:0 4px;"></span>
      <div class="turno-extra"><span class="turno-extra-label">🌙 Noturnas</span><input type="text" class="turno-input-sm" id="tn-${tid}" value="${d ? d.noturnas : ''}" placeholder="—" oninput="calcTotaisPeriodo('${pid}')" autocomplete="off"></div>
      <div class="turno-extra"><span class="turno-extra-label">📅 Feriado</span><input type="text" class="turno-input-sm" id="tf-${tid}" value="${d ? d.feriado : ''}" placeholder="—" oninput="calcTotaisPeriodo('${pid}')" autocomplete="off"></div>
    </div>
    <button class="btn-rm-turno" onclick="removerTurno('${pid}','${tid}')" title="Remover">×</button>`;
  wrap.appendChild(row);
  renumTurnos(pid);
}
function removerTurno(pid, tid) { document.getElementById('tr-' + tid)?.remove(); renumTurnos(pid); }
function renumTurnos(pid) {
  const rows = document.querySelectorAll(`#turnos-${pid} .turno-row`);
  rows.forEach((r, i) => { const n = r.querySelector('.turno-num'); if (n) n.textContent = rows.length === 1 ? 'Turno' : 'Turno ' + (i + 1); });
}
function calcTotaisPeriodo(pid) {
  const rows = [...document.querySelectorAll(`#turnos-${pid} .turno-row`)];
  let totMin = 0, notMin = 0, ferMin = 0;
  rows.forEach(r => {
    const tid = r.id.replace('tr-', '');
    const parseFn = v => { if (!v) return 0; const m = v.match(/(\d+)h(\d+)?/i); if (m) return parseInt(m[1]) * 60 + (parseInt(m[2] || 0)); const n = parseFloat(v.replace(',', '.')); return isNaN(n) ? 0 : Math.round(n * 60); };
    totMin += parseFn(document.getElementById('tt-' + tid)?.value);
    notMin += parseFn(document.getElementById('tn-' + tid)?.value);
    ferMin += parseFn(document.getElementById('tf-' + tid)?.value);
  });
  const fmt = m => { if (!m) return ''; const h = Math.floor(m / 60), mn = m % 60; return mn ? `${h}h${String(mn).padStart(2, '0')}` : `${h}h`; };
  const ht  = document.getElementById('th-' + pid);
  const tnt = document.getElementById('thn-' + pid);
  const tft = document.getElementById('thf-' + pid);
  if (ht  && !ht.dataset.manual) ht.value  = fmt(totMin);
  if (tnt) tnt.value = fmt(notMin);
  if (tft) tft.value = fmt(ferMin);
}
function calcTurno(pid, tid) {
  const e = document.getElementById('te-' + tid)?.value;
  const s = document.getElementById('ts-' + tid)?.value;
  if (!e || !s) return;
  const [eh, em] = e.split(':').map(Number), [sh, sm] = s.split(':').map(Number);
  let mins = (sh * 60 + sm) - (eh * 60 + em); if (mins <= 0) return;
  const h = Math.floor(mins / 60), m = mins % 60;
  const tot = document.getElementById('tt-' + tid);
  if (tot) tot.value = m ? `${h}h${String(m).padStart(2, '0')}` : `${h}h`;
  calcTotaisPeriodo(pid);
}
function getTurnos(pid) {
  return [...document.querySelectorAll(`#turnos-${pid} .turno-row`)].map(r => {
    const tid = r.id.replace('tr-', '');
    return { entrada: document.getElementById('te-' + tid)?.value || '', saida: document.getElementById('ts-' + tid)?.value || '', total: document.getElementById('tt-' + tid)?.value || '', noturnas: document.getElementById('tn-' + tid)?.value || '', feriado: document.getElementById('tf-' + tid)?.value || '' };
  }).filter(t => t.entrada || t.saida);
}
function getPeriodos() {
  return [...document.querySelectorAll('.periodo-block')].map(bl => {
    const id = bl.id.replace('block-', ''), s = PS[id]; if (!s) return null;
    return { dias: [...s.diasSel].sort((a, b) => a - b), mes: s.mes, mesNome: MESES[s.mes], ano: s.ano, turnos: getTurnos(id), totalHoras: document.getElementById('th-' + id).value, totalNoturnas: document.getElementById('thn-' + id)?.value || '', totalFeriado: document.getElementById('thf-' + id)?.value || '' };
  }).filter(Boolean);
}

// ── SUBMIT ──
async function submitReclamacao() {
  if (!trabalhador) return;

  // ── Verificação de rate limit ──
  const agora = Date.now();
  if (_submitCount >= RATE_LIMIT_MAX) {
    showAlert('alertForm', 'err', `Limite de ${RATE_LIMIT_MAX} submissões por sessão atingido. Recarrega a página se precisares de submeter novamente.`);
    return;
  }
  const segundosDesdeUltimo = (agora - _lastSubmitTime) / 1000;
  if (_lastSubmitTime > 0 && segundosDesdeUltimo < RATE_LIMIT_COOLDOWN) {
    const espera = Math.ceil(RATE_LIMIT_COOLDOWN - segundosDesdeUltimo);
    showAlert('alertForm', 'err', `Aguarda ${espera}s antes de submeter novamente.`);
    return;
  }
  const nome    = document.getElementById('fNome').value.trim();
  const nif     = document.getElementById('fNif').value.trim();
  const numFunc = document.getElementById('fNumFunc').value.trim();
  const empresa = document.getElementById('fEmpresa').value.trim();
  if (!nome)    { showAlert('alertForm', 'err', 'Nome obrigatório.'); return; }
  if (!empresa) { showAlert('alertForm', 'err', 'Empresa utilizadora obrigatória.'); return; }
  const periodos = getPeriodos();
  if (!periodos.length || periodos.every(p => p.dias.length === 0)) {
    showAlert('alertForm', 'err', 'Seleciona pelo menos um dia num período.');
    return;
  }
  hideAlert('alertForm');
  const codigo         = trabalhador.codigoPublico || trabalhador.id;
  const resumoPeriodo  = periodos.map(p => `${p.dias.length} dia(s) — ${p.mesNome} ${p.ano}`).join(' | ');
  try {
    await colRec.add({
      numFunc, nif, nome, empresa,
      categoria: document.getElementById('fCategoria').value.trim(),
      escritorio: document.getElementById('fEscritorio').value,
      canal:  selCanalVal,
      notas:  document.getElementById('fNotas').value.trim(),
      periodos, resumoPeriodo,
      codigoPortal: codigo,
      estado:    'nova',
      criadoPor: nome,
      criadoEm:  Date.now(),
      historico: [{ estado: 'nova', nota: 'Submetido pelo trabalhador', por: nome, em: Date.now() }]
    });
    // Registar submissão para rate limiting
    _submitCount++;
    _lastSubmitTime = Date.now();
    // Cooldown visual no botão
    const btnSubmit = document.getElementById('btnSubmit');
    if (btnSubmit && _submitCount < RATE_LIMIT_MAX) {
      let restante = RATE_LIMIT_COOLDOWN;
      btnSubmit.disabled = true;
      const iv = setInterval(() => {
        restante--;
        if (restante <= 0) {
          clearInterval(iv);
          btnSubmit.disabled = false;
          btnSubmit.textContent = 'Submeter Reclamação';
        } else {
          btnSubmit.textContent = `Aguarda ${restante}s…`;
        }
      }, 1000);
    } else if (btnSubmit && _submitCount >= RATE_LIMIT_MAX) {
      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Limite atingido';
    }
    // Actualizar nome e ultimaReclamacao no portal
    const updates = { ultimaReclamacao: Date.now() };
    if (!trabalhador.nome) updates.nome = nome;
    await colPortal.doc(codigo).update(updates);
    if (!trabalhador.nome) {
      trabalhador.nome = nome;
      document.getElementById('listaNome').textContent = nome;
    }
    toast('✓ Reclamação submetida com sucesso!');
    mostrarVistaLista();
  } catch(e) {
    console.error(e);
    showAlert('alertForm', 'err', 'Erro ao submeter. Tenta novamente.');
  }
}

function prefillForm() {
  document.getElementById('fNif').value    = trabalhador.nif || '';
  document.getElementById('fNumFunc').value = trabalhador.numFunc || '';
  document.getElementById('fNome').value   = trabalhador.nome || '';
}

function resetForm() {
  document.getElementById('periodosWrap').innerHTML = '';
  Object.keys(PS).forEach(k => delete PS[k]);
  periodoCount = 0;
  turnoCount   = 0;
  prefillForm();
  document.getElementById('fCategoria').value = '';
  document.getElementById('fEmpresa').value   = '';
  document.getElementById('fNotas').value     = '';
  document.getElementById('fEscritorio').value = '';
  hideAlert('alertForm');
}

// ── HELPERS ──
function estadoClass(e) { return (e || 'nova').replace(/-/g, ''); }
function estadoPillClass(e) { const c = estadoClass(e); return c === 'aguardaproc' ? 'aguarda-proc' : c === 'semfundamento' ? 'sem-fundamento' : c; }

// ── INIT: carregar escritórios ──
const ESCRITORIOS_FALLBACK = [
  {id:'quarteira',nome:'Quarteira'},{id:'albufeira',nome:'Albufeira'},
  {id:'lisboa',nome:'Lisboa'},{id:'porto',nome:'Porto'}
];
function popularEscritorios(lista) {
  const sel = document.getElementById('fEscritorio');
  sel.innerHTML = '<option value="">— Selecionar —</option>' + lista.map(e => `<option value="${e.id}">${e.nome}</option>`).join('');
}
db.collection('config').doc('escritorios').get()
  .then(snap => {
    const lista = (snap.exists && snap.data() && Array.isArray(snap.data().lista))
      ? snap.data().lista : ESCRITORIOS_FALLBACK;
    popularEscritorios(lista);
  })
  .catch(() => popularEscritorios(ESCRITORIOS_FALLBACK));
</script>
