<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reclamações — Assistente</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Manrope:wght@600;700;800&display=swap');

:root {
  --bg:#f4f4f6; --surface:#fff; --surface2:#f7f7f9; --border:#e2e2e8;
  --text:#1a1a22; --muted:#8888a0; --accent:#2563eb;
  --green:#16a34a; --green-bg:#f0fdf4; --green-border:#bbf7d0;
  --red:#dc2626;   --red-bg:#fef2f2;   --red-border:#fecaca;
  --amber:#d97706; --amber-bg:#fffbeb; --amber-border:#fde68a;
  --blue-bg:#eff6ff; --blue-border:#bfdbfe;
  --bot-bubble:#f0f4ff; --user-bubble:#1a1a22;
  --chat-max:680px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:'DM Mono',monospace;color:var(--text);}

/* ── Grid pattern bg ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),
                   linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;opacity:.35;pointer-events:none;z-index:0;
}

/* ══════════════════════════════
   LAYOUT
══════════════════════════════ */
.shell{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  height:100vh;max-width:var(--chat-max);
  margin:0 auto;
}

/* ── Header ── */
.chat-header{
  flex-shrink:0;
  padding:16px 20px 14px;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;gap:12px;
}
.chat-logo{
  width:36px;height:36px;background:var(--text);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.chat-logo svg{width:18px;height:18px;color:#fff;}
.chat-header-info{}
.chat-header-title{font-family:'Manrope',sans-serif;font-weight:800;font-size:14px;letter-spacing:-.02em;}
.chat-header-sub{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:1px;}
.chat-header-status{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}

/* ── Messages area ── */
.chat-messages{
  flex:1;overflow-y:auto;
  padding:20px 16px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
}

/* ── Bubbles ── */
.msg{display:flex;gap:8px;max-width:90%;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg.bot{align-self:flex-start;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}

.msg-avatar{
  width:28px;height:28px;border-radius:8px;
  background:var(--text);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:#fff;margin-top:2px;
}
.msg.user .msg-avatar{background:var(--accent);}

.msg-bubble{
  padding:10px 14px;border-radius:14px;
  font-size:12px;line-height:1.6;
  border:1px solid var(--border);
  max-width:100%;
}
.msg.bot  .msg-bubble{background:var(--surface);border-radius:4px 14px 14px 14px;}
.msg.user .msg-bubble{background:var(--user-bubble);color:#fff;border-color:transparent;border-radius:14px 4px 14px 14px;}

.msg-bubble strong{font-family:'Manrope',sans-serif;font-weight:700;}
.msg-bubble ul{padding-left:16px;margin-top:4px;}
.msg-bubble li{margin-bottom:2px;}

/* Typing indicator */
.typing-bubble{display:flex;gap:4px;align-items:center;padding:12px 16px;}
.typing-bubble span{
  width:6px;height:6px;border-radius:50%;background:var(--muted);
  animation:bounce .9s infinite;
}
.typing-bubble span:nth-child(2){animation-delay:.15s;}
.typing-bubble span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

/* ── Quick replies ── */
.quick-replies{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-top:8px;margin-left:36px;
}
.qr{
  padding:5px 12px;border-radius:20px;
  background:var(--surface);border:1px solid var(--border);
  font-family:'DM Mono',monospace;font-size:10px;
  text-transform:uppercase;letter-spacing:.07em;
  cursor:pointer;color:var(--text);
  transition:all .15s;
}
.qr:hover{border-color:var(--accent);color:var(--accent);}

/* ── File preview chips ── */
.file-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
.file-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:8px;
  background:var(--blue-bg);border:1px solid var(--blue-border);
  font-size:10px;color:var(--accent);max-width:200px;
}
.file-chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-chip-del{cursor:pointer;opacity:.6;font-size:13px;flex-shrink:0;line-height:1;}
.file-chip-del:hover{opacity:1;color:var(--red);}

/* Upload progress */
.upload-progress{
  height:2px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;
}
.upload-progress-bar{
  height:100%;background:var(--accent);border-radius:2px;
  transition:width .3s;width:0%;
}

/* ── Input area ── */
.chat-input-area{
  flex-shrink:0;
  padding:12px 16px 16px;
  border-top:1px solid var(--border);
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(8px);
}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.input-wrap{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:8px 12px;
  transition:border-color .15s;
}
.input-wrap:focus-within{border-color:var(--accent);}
#msgInput{
  width:100%;background:none;border:none;outline:none;
  font-family:'DM Mono',monospace;font-size:12px;color:var(--text);
  resize:none;max-height:100px;min-height:20px;line-height:1.5;
}
#msgInput::placeholder{color:#bbb;}
.input-actions{display:flex;align-items:center;gap:6px;margin-top:6px;}
.btn-attach{
  background:none;border:none;cursor:pointer;
  color:var(--muted);font-size:14px;padding:2px;
  transition:color .15s;display:flex;align-items:center;
}
.btn-attach:hover{color:var(--accent);}
.attach-hint{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}

.btn-send{
  width:40px;height:40px;border-radius:10px;
  background:var(--text);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.btn-send:hover{background:var(--accent);}
.btn-send svg{width:16px;height:16px;color:#fff;}
.btn-send:disabled{opacity:.4;cursor:default;}

/* ── Summary card (confirmação final) ── */
.summary-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;font-size:11px;
  margin-top:6px;line-height:1.8;
}
.summary-card .row{display:flex;gap:8px;}
.summary-card .lbl{color:var(--muted);min-width:100px;text-transform:uppercase;font-size:9px;letter-spacing:.07em;padding-top:2px;}
.summary-card .val{color:var(--text);font-weight:500;flex:1;}
.summary-card .divider{border:none;border-top:1px solid var(--border);margin:8px 0;}
.summary-files{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.summary-file{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:6px;
  background:var(--blue-bg);border:1px solid var(--blue-border);
  font-size:9px;color:var(--accent);
}

/* ── Toast ── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--text);color:#fff;font-size:11px;
  padding:9px 18px;border-radius:20px;
  opacity:0;transition:all .25s;pointer-events:none;z-index:999;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Scrollbar */
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-track{background:transparent;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<div class="shell">

  <!-- Header -->
  <div class="chat-header">
    <div class="chat-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
        <path d="M12 8v4l3 3"/>
      </svg>
    </div>
    <div class="chat-header-info">
      <div class="chat-header-title">Assistente de Reclamações</div>
      <div class="chat-header-sub">Portal do Trabalhador</div>
    </div>
    <div class="chat-header-status">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chatMessages"></div>

  <!-- Input -->
  <div class="chat-input-area">
    <div id="fileChips" class="file-chips"></div>
    <div class="input-row">
      <div class="input-wrap">
        <textarea id="msgInput" rows="1" placeholder="Escreve aqui…"></textarea>
        <div class="input-actions">
          <label class="btn-attach" title="Anexar ficheiro">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
            <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="display:none" onchange="onFilesSelected(event)">
          </label>
          <span class="attach-hint">PDF · Imagem · Doc</span>
        </div>
      </div>
      <button class="btn-send" id="btnSend" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   FIREBASE
═══════════════════════════════════════════════════ */
if (!firebase.apps.length) {
  firebase.initializeApp({
    apiKey: "AIzaSyBbTDfCCC9o5oxMSMRsvCUC50Iu6L0aqT8",
    authDomain: "calendario-trabalho-39a6c.firebaseapp.com",
    projectId: "calendario-trabalho-39a6c",
    storageBucket: "calendario-trabalho-39a6c.firebasestorage.app",
    messagingSenderId: "596069405321",
    appId: "1:596069405321:web:275bb9da220206d3da6c58"
  });
}
const db      = firebase.firestore();
const storage = firebase.storage();
const colRec    = db.collection('reclamacoes_horas');
const colPortal = db.collection('trabalhadores_portal');

/* ═══════════════════════════════════════════════════
   ESTADO DA CONVERSA
═══════════════════════════════════════════════════ */
const STEPS = [
  'identificacao',   // NIF + num funcionário OU código
  'nome',
  'empresa',
  'categoria',
  'escritorio',
  'periodos',        // mês/ano + dias
  'notas',
  'ficheiros',       // upload opcional
  'confirmacao',     // mostrar resumo → confirmar ou cancelar
  'done'
];

let state = {
  step: 'start',
  // dados do trabalhador
  trabalhador: null,   // doc do portal
  // dados da reclamação
  nif: '', numFunc: '', nome: '', empresa: '',
  categoria: '', escritorio: '', notas: '',
  periodos: [],        // [{mes, mesNome, ano, dias, turnos, totalHoras}]
  ficheiros: [],       // [{file, url, nome, tamanho}]
  // sub-estado período
  periodoAtual: null,  // {mes, ano, dias:[]}
  entradaHora: '', saidaHora: '',
};

let pendingFiles = []; // ficheiros seleccionados antes do upload

const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
               'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const ESCRITORIOS_FALLBACK = [
  {id:'quarteira',nome:'Quarteira'},{id:'albufeira',nome:'Albufeira'},
  {id:'lisboa',nome:'Lisboa'},{id:'porto',nome:'Porto'}
];
let escritorios = ESCRITORIOS_FALLBACK;

// Carregar escritórios do Firestore
db.collection('config').doc('escritorios').get()
  .then(s => { if (s.exists && Array.isArray(s.data().lista)) escritorios = s.data().lista; })
  .catch(() => {});

/* ═══════════════════════════════════════════════════
   RENDER CHAT
═══════════════════════════════════════════════════ */
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addMsg(role, html, opts = {}) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? '🤖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = html;

  el.appendChild(avatar);
  el.appendChild(bubble);
  document.getElementById('chatMessages').appendChild(el);

  // Quick replies
  if (opts.quickReplies && opts.quickReplies.length) {
    const qr = document.createElement('div');
    qr.className = 'quick-replies';
    opts.quickReplies.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'qr';
      btn.textContent = label;
      btn.onclick = () => { qr.remove(); handleQuickReply(label); };
      qr.appendChild(btn);
    });
    document.getElementById('chatMessages').appendChild(qr);
  }

  scrollBottom();
  return el;
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.id = 'typing';
  el.innerHTML = `<div class="msg-avatar">🤖</div>
    <div class="msg-bubble"><div class="typing-bubble">
      <span></span><span></span><span></span>
    </div></div>`;
  document.getElementById('chatMessages').appendChild(el);
  scrollBottom();
}
function removeTyping() {
  document.getElementById('typing')?.remove();
}

function scrollBottom() {
  const el = document.getElementById('chatMessages');
  setTimeout(() => el.scrollTop = el.scrollHeight, 50);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ═══════════════════════════════════════════════════
   FICHEIROS — SELECÇÃO E UPLOAD
═══════════════════════════════════════════════════ */
function onFilesSelected(e) {
  const files = [...e.target.files];
  files.forEach(f => {
    if (pendingFiles.find(p => p.name === f.name)) return;
    pendingFiles.push(f);
  });
  renderFileChips();
  e.target.value = '';
}

function renderFileChips() {
  const el = document.getElementById('fileChips');
  el.innerHTML = pendingFiles.map((f, i) => `
    <div class="file-chip">
      <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V5L9 1z"/><path d="M9 1v4h4"/></svg>
      <span class="file-chip-name">${escHtml(f.name)}</span>
      <span class="file-chip-del" onclick="removeFile(${i})">×</span>
    </div>`).join('');
}

function removeFile(i) {
  pendingFiles.splice(i, 1);
  renderFileChips();
}

async function uploadFiles(recId) {
  if (!pendingFiles.length) return [];
  const urls = [];
  for (const file of pendingFiles) {
    const ref = storage.ref(`reclamacoes/${recId}/${Date.now()}_${file.name}`);
    const task = ref.put(file);
    await new Promise((res, rej) => {
      task.on('state_changed', null, rej, async () => {
        const url = await ref.getDownloadURL();
        urls.push({ nome: file.name, url, tamanho: file.size });
        res();
      });
    });
  }
  return urls;
}

/* ═══════════════════════════════════════════════════
   LÓGICA DA CONVERSA
═══════════════════════════════════════════════════ */
async function botReply(html, opts = {}, delay = 600) {
  addTyping();
  await new Promise(r => setTimeout(r, delay));
  removeTyping();
  addMsg('bot', html, opts);
}

async function start() {
  await botReply(`Olá! 👋 Bem-vindo ao <strong>Assistente de Reclamações de Horas</strong>.<br><br>
Vou ajudar-te a submeter uma reclamação em poucos passos.<br>
Já tens um <strong>código de portal</strong> de um acesso anterior?`,
    { quickReplies: ['Sim, tenho código', 'Não, é a primeira vez'] });
  state.step = 'start_choice';
}

async function handleInput(text) {
  text = text.trim();
  if (!text && !pendingFiles.length) return;

  const s = state.step;

  /* ── Ficheiros pendentes mencionados ── */
  if (pendingFiles.length && s === 'ficheiros') {
    // aceitar e avançar
    addMsg('user', `📎 ${pendingFiles.length} ficheiro(s) anexado(s)`);
    await processStep('ficheiros_ok');
    return;
  }

  if (text) addMsg('user', escHtml(text));

  await processStep(s, text);
}

async function processStep(step, input = '') {
  const inp = input.trim();

  switch (step) {

    /* ── Escolha inicial ── */
    case 'start_choice': {
      const temCodigo = /sim|tenho|código|codigo|ja|já/i.test(inp);
      if (temCodigo) {
        await botReply('Qual é o teu <strong>código de portal</strong>? (ex: XK7F2)');
        state.step = 'codigo_login';
      } else {
        await botReply('Sem problema! Qual é o teu <strong>NIF</strong>?');
        state.step = 'nif';
      }
      break;
    }

    /* ── Login por código ── */
    case 'codigo_login': {
      const codigo = inp.toUpperCase();
      addTyping();
      try {
        const snap = await colPortal.doc(codigo).get();
        removeTyping();
        if (snap.exists) {
          state.trabalhador = { id: snap.id, ...snap.data() };
          state.nif     = state.trabalhador.nif     || '';
          state.numFunc = state.trabalhador.numFunc  || '';
          state.nome    = state.trabalhador.nome     || '';
          await botReply(`Bem-vindo de volta${state.nome ? ', <strong>' + escHtml(state.nome) + '</strong>' : ''}! 🎉<br>
Código confirmado. Vamos começar a reclamação.<br><br>
Qual a <strong>empresa utilizadora</strong> onde trabalhaste?`);
          state.step = 'empresa';
        } else {
          removeTyping();
          await botReply('Código não encontrado. Verifica e tenta novamente, ou escreve <strong>"novo"</strong> para criar um registo.',
            { quickReplies: ['Tentar novamente', 'Criar novo registo'] });
          state.step = 'codigo_login_retry';
        }
      } catch(e) {
        removeTyping();
        await botReply('Erro de ligação. Tenta novamente.');
      }
      break;
    }

    case 'codigo_login_retry': {
      if (/novo|criar|registo/i.test(inp)) {
        await botReply('Qual é o teu <strong>NIF</strong>?');
        state.step = 'nif';
      } else {
        state.step = 'codigo_login';
        await processStep('codigo_login', inp);
      }
      break;
    }

    /* ── Registo por NIF ── */
    case 'nif': {
      if (!/^\d{9}$/.test(inp)) {
        await botReply('O NIF deve ter exactamente 9 dígitos. Tenta novamente.');
        break;
      }
      state.nif = inp;
      await botReply('Qual o teu <strong>número de funcionário</strong>?');
      state.step = 'numFunc';
      break;
    }

    case 'numFunc': {
      state.numFunc = inp;
      addTyping();
      try {
        const snap = await colPortal.where('nif', '==', state.nif).limit(20).get();
        const match = snap.docs.find(d => d.data().numFunc === inp);
        removeTyping();
        if (match) {
          state.trabalhador = { id: match.id, ...match.data() };
          state.nome = state.trabalhador.nome || '';
          await botReply(`Registo encontrado${state.nome ? ' — <strong>' + escHtml(state.nome) + '</strong>' : ''}.<br>
O teu código de portal é: <strong>${match.id}</strong> (guarda-o para acessos futuros).<br><br>
Qual a <strong>empresa utilizadora</strong>?`);
          state.step = 'empresa';
        } else {
          // Novo registo
          const codigo = Math.random().toString(36).slice(2,7).toUpperCase();
          const doc = { codigoPublico: codigo, nif: state.nif, numFunc: state.numFunc, nome: '', criadoEm: Date.now(), ultimaReclamacao: null };
          await colPortal.doc(codigo).set(doc);
          state.trabalhador = { id: codigo, ...doc };
          await botReply(`Registo criado! 🎉<br>
O teu <strong>código de portal</strong> é: <code style="background:var(--surface2);padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;">${codigo}</code><br>
<span style="color:var(--amber);font-size:11px;">⚠️ Guarda este código — vais precisar nas próximas vezes.</span><br><br>
Qual o teu <strong>nome completo</strong>?`);
          state.step = 'nome';
        }
      } catch(e) {
        removeTyping();
        await botReply('Erro de ligação. Tenta novamente.');
      }
      break;
    }

    case 'nome': {
      if (inp.length < 2) { await botReply('Precisamos do nome completo.'); break; }
      state.nome = inp;
      await botReply(`Obrigado, <strong>${escHtml(inp)}</strong>!<br>Qual a <strong>empresa utilizadora</strong> onde trabalhaste?`);
      state.step = 'empresa';
      break;
    }

    case 'empresa': {
      if (!inp) { await botReply('Nome da empresa obrigatório.'); break; }
      state.empresa = inp;
      await botReply('Qual a <strong>categoria profissional</strong>? (ex: Empregado de Mesa, Cozinheiro…)<br><span style="color:var(--muted);font-size:10px;">Ou escreve <em>saltar</em> para continuar.</span>');
      state.step = 'categoria';
      break;
    }

    case 'categoria': {
      state.categoria = /saltar|skip/i.test(inp) ? '' : inp;
      // Mostrar botões dos escritórios
      const escBtns = escritorios.map(e => e.nome);
      await botReply('Qual o <strong>escritório</strong> associado?', { quickReplies: escBtns });
      state.step = 'escritorio';
      break;
    }

    case 'escritorio': {
      const found = escritorios.find(e =>
        e.nome.toLowerCase() === inp.toLowerCase() || e.id.toLowerCase() === inp.toLowerCase()
      );
      state.escritorio = found ? found.id : inp.toLowerCase();
      await botReply(`Agora os <strong>períodos reclamados</strong>.<br>
Indica o <strong>mês e ano</strong> (ex: <em>Março 2026</em> ou <em>03/2026</em>).`);
      state.step = 'periodo_mes';
      state.periodoAtual = { mes: null, mesNome: '', ano: null, dias: [], turnos: [], totalHoras: '' };
      break;
    }

    /* ── Períodos ── */
    case 'periodo_mes': {
      const parsed = parseMesAno(inp);
      if (!parsed) {
        await botReply('Formato não reconhecido. Usa por exemplo: <em>Março 2026</em> ou <em>03/2026</em>.');
        break;
      }
      state.periodoAtual.mes     = parsed.mes;
      state.periodoAtual.mesNome = MESES[parsed.mes];
      state.periodoAtual.ano     = parsed.ano;
      await botReply(`Quais os <strong>dias</strong> de <strong>${MESES[parsed.mes]} ${parsed.ano}</strong>?<br>
Podes escrever vários separados por vírgula ou intervalo:<br>
<span style="color:var(--muted);font-size:10px;">ex: <em>3, 5, 10-14, 22</em></span>`);
      state.step = 'periodo_dias';
      break;
    }

    case 'periodo_dias': {
      const dias = parseDias(inp);
      if (!dias.length) {
        await botReply('Não consegui interpretar os dias. Usa vírgulas e/ou intervalos com traço (ex: 3, 5, 10-14).');
        break;
      }
      state.periodoAtual.dias = dias;
      await botReply(`${dias.length} dia(s) registado(s).<br><br>
Indica o <strong>horário</strong> (entrada e saída). Ex: <em>08:00 - 16:30</em><br>
<span style="color:var(--muted);font-size:10px;">Ou escreve <em>saltar</em> se não aplicável.</span>`);
      state.step = 'periodo_horario';
      break;
    }

    case 'periodo_horario': {
      if (!/saltar|skip/i.test(inp)) {
        const h = parseHorario(inp);
        if (h) {
          state.periodoAtual.turnos = [{ entrada: h.entrada, saida: h.saida, total: h.total }];
          state.periodoAtual.totalHoras = h.total;
        }
      }
      // Guardar período e perguntar se tem mais
      state.periodos.push({ ...state.periodoAtual });
      state.periodoAtual = null;
      await botReply(`Período adicionado ✓<br>
<strong>${state.periodos.length}</strong> período(s) registado(s) até agora.<br>
Tens mais algum período para reclamar?`,
        { quickReplies: ['Sim, mais um período', 'Não, continuar'] });
      state.step = 'mais_periodos';
      break;
    }

    case 'mais_periodos': {
      if (/sim|mais|outro|adicionar/i.test(inp)) {
        await botReply('Qual o próximo <strong>mês e ano</strong>?');
        state.periodoAtual = { mes: null, mesNome: '', ano: null, dias: [], turnos: [], totalHoras: '' };
        state.step = 'periodo_mes';
      } else {
        await botReply('Alguma <strong>nota adicional</strong> que queiras incluir?<br><span style="color:var(--muted);font-size:10px;">Ou escreve <em>saltar</em> para continuar.</span>');
        state.step = 'notas';
      }
      break;
    }

    case 'notas': {
      state.notas = /saltar|skip/i.test(inp) ? '' : inp;
      await botReply(`Queres <strong>anexar ficheiros</strong>? (contratos, folhas de ponto, capturas de ecrã…)<br>
Usa o ícone 📎 abaixo para seleccionar ficheiros, e depois clica <em>Enviar</em>.<br>
<span style="color:var(--muted);font-size:10px;">Ou escreve <em>saltar</em> para continuar sem ficheiros.</span>`);
      state.step = 'ficheiros';
      break;
    }

    case 'ficheiros':
    case 'ficheiros_ok': {
      if (/saltar|skip|não|nao/i.test(inp) && step !== 'ficheiros_ok') {
        pendingFiles = [];
        renderFileChips();
      }
      // Mostrar resumo
      await mostrarResumo();
      break;
    }

    /* ── Confirmação ── */
    case 'confirmacao': {
      if (/sim|confirmar|submeter|yes/i.test(inp)) {
        await submeterReclamacao();
      } else {
        await botReply('Reclamação cancelada. Se quiseres recomeçar, actualiza a página.', {
          quickReplies: ['Recomeçar']
        });
        state.step = 'done';
      }
      break;
    }

    case 'done': {
      if (/recomeçar|recomecar/i.test(inp)) location.reload();
      else await botReply('A reclamação já foi submetida. Para uma nova reclamação, actualiza a página.');
      break;
    }

    default:
      await botReply('Não percebi. Podes repetir?');
  }
}

async function handleQuickReply(label) {
  addMsg('user', escHtml(label));
  await processStep(state.step, label);
}

/* ═══════════════════════════════════════════════════
   RESUMO E SUBMISSÃO
═══════════════════════════════════════════════════ */
async function mostrarResumo() {
  const periodosTxt = state.periodos.map(p =>
    `<li><strong>${p.mesNome} ${p.ano}</strong> — ${p.dias.length} dia(s): ${p.dias.join(', ')}` +
    (p.totalHoras ? ` · ${p.totalHoras}` : '') + '</li>'
  ).join('');

  const filesTxt = pendingFiles.length
    ? pendingFiles.map(f => `<span class="summary-file">📎 ${escHtml(f.name)}</span>`).join('')
    : '<span style="color:var(--muted);font-size:10px;">Nenhum</span>';

  const html = `Revê os dados antes de submeter:<div class="summary-card">
    <div class="row"><span class="lbl">Nome</span><span class="val">${escHtml(state.nome)}</span></div>
    <div class="row"><span class="lbl">NIF</span><span class="val">${escHtml(state.nif)}</span></div>
    <div class="row"><span class="lbl">Nº Func.</span><span class="val">${escHtml(state.numFunc)}</span></div>
    <hr class="divider">
    <div class="row"><span class="lbl">Empresa</span><span class="val">${escHtml(state.empresa)}</span></div>
    ${state.categoria ? `<div class="row"><span class="lbl">Categoria</span><span class="val">${escHtml(state.categoria)}</span></div>` : ''}
    ${state.escritorio ? `<div class="row"><span class="lbl">Escritório</span><span class="val">${escHtml(state.escritorio)}</span></div>` : ''}
    <hr class="divider">
    <div class="row"><span class="lbl">Períodos</span><span class="val"><ul style="padding-left:14px">${periodosTxt}</ul></span></div>
    ${state.notas ? `<div class="row"><span class="lbl">Notas</span><span class="val">${escHtml(state.notas)}</span></div>` : ''}
    <hr class="divider">
    <div class="row"><span class="lbl">Ficheiros</span><span class="val"><div class="summary-files">${filesTxt}</div></span></div>
  </div>`;

  await botReply(html, { quickReplies: ['✓ Confirmar e submeter', '✕ Cancelar'] });
  state.step = 'confirmacao';
}

async function submeterReclamacao() {
  addTyping();
  try {
    const codigo = state.trabalhador ? (state.trabalhador.codigoPublico || state.trabalhador.id) : '';
    const resumoPeriodo = state.periodos.map(p => `${p.dias.length} dia(s) — ${p.mesNome} ${p.ano}`).join(' | ');

    // Criar documento (para obter o ID antes do upload)
    const docRef = await colRec.add({
      numFunc: state.numFunc,
      nif: state.nif,
      nome: state.nome,
      empresa: state.empresa,
      categoria: state.categoria,
      escritorio: state.escritorio,
      canal: 'bot',
      notas: state.notas,
      periodos: state.periodos,
      resumoPeriodo,
      codigoPortal: codigo,
      estado: 'nova',
      criadoPor: state.nome,
      criadoEm: Date.now(),
      historico: [{ estado: 'nova', nota: 'Submetido via assistente de chat', por: state.nome, em: Date.now() }],
      ficheiros: []
    });

    // Upload de ficheiros (se existirem)
    let ficheirosGuardados = [];
    if (pendingFiles.length) {
      ficheirosGuardados = await uploadFiles(docRef.id);
      await docRef.update({ ficheiros: ficheirosGuardados });
    }

    // Actualizar portal
    if (state.trabalhador) {
      const updates = { ultimaReclamacao: Date.now() };
      if (!state.trabalhador.nome && state.nome) updates.nome = state.nome;
      await colPortal.doc(state.trabalhador.id).update(updates);
    }

    removeTyping();
    pendingFiles = [];
    renderFileChips();

    await botReply(`✅ <strong>Reclamação submetida com sucesso!</strong><br><br>
Referência: <code style="background:var(--surface2);padding:2px 6px;border-radius:4px;">${docRef.id.slice(0,8).toUpperCase()}</code><br>
${ficheirosGuardados.length ? `📎 ${ficheirosGuardados.length} ficheiro(s) guardado(s).<br>` : ''}
<br>A tua reclamação está agora com estado <strong>Nova</strong> e será analisada em breve.<br><br>
Obrigado! Se precisares de submeter outra reclamação, actualiza a página.`);
    state.step = 'done';

  } catch(e) {
    removeTyping();
    console.error(e);
    await botReply('❌ Erro ao submeter. Por favor tenta novamente.',
      { quickReplies: ['Tentar novamente'] });
    state.step = 'confirmacao';
  }
}

/* ═══════════════════════════════════════════════════
   PARSERS
═══════════════════════════════════════════════════ */
function parseMesAno(txt) {
  // "Março 2026" / "março de 2026" / "03/2026" / "3/2026"
  const byName = txt.match(/([a-záéíóúàâêôãõçA-Z]+)\s*(?:de\s*)?(\d{4})/i);
  if (byName) {
    const mesIdx = MESES.findIndex(m => m.toLowerCase().startsWith(byName[1].toLowerCase().slice(0,3)));
    if (mesIdx >= 0) return { mes: mesIdx, ano: parseInt(byName[2]) };
  }
  const byNum = txt.match(/(\d{1,2})[\/\-](\d{4})/);
  if (byNum) return { mes: parseInt(byNum[1]) - 1, ano: parseInt(byNum[2]) };
  return null;
}

function parseDias(txt) {
  const dias = new Set();
  // "3, 5, 10-14, 22"
  const parts = txt.split(/[,;]+/);
  parts.forEach(p => {
    p = p.trim();
    const range = p.match(/^(\d{1,2})\s*[-–]\s*(\d{1,2})$/);
    if (range) {
      for (let i = parseInt(range[1]); i <= parseInt(range[2]); i++) dias.add(i);
    } else {
      const d = parseInt(p);
      if (!isNaN(d) && d >= 1 && d <= 31) dias.add(d);
    }
  });
  return [...dias].sort((a,b) => a-b);
}

function parseHorario(txt) {
  // "08:00 - 16:30" / "8h - 16h30" / "08:00 16:30"
  const m = txt.match(/(\d{1,2})[h:](\d{0,2})\s*[-–\s]+\s*(\d{1,2})[h:](\d{0,2})/i);
  if (!m) return null;
  const eh = parseInt(m[1]), em = parseInt(m[2]||0);
  const sh = parseInt(m[3]), sm = parseInt(m[4]||0);
  const mins = (sh*60+sm) - (eh*60+em);
  if (mins <= 0) return null;
  const h = Math.floor(mins/60), min = mins%60;
  return {
    entrada: `${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}`,
    saida:   `${String(sh).padStart(2,'0')}:${String(sm).padStart(2,'0')}`,
    total:   min ? `${h}h${String(min).padStart(2,'0')}` : `${h}h`
  };
}

/* ═══════════════════════════════════════════════════
   INPUT HANDLING
═══════════════════════════════════════════════════ */
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text && !pendingFiles.length) return;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('btnSend').disabled = true;
  await handleInput(text);
  document.getElementById('btnSend').disabled = false;
}

document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

/* ── Arrancar ── */
window.addEventListener('load', () => start());
</script>
